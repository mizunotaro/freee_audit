name: Emergency Stop

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for emergency stop'
        required: true
        default: 'Security threat detected'
        type: string
      severity:
        description: 'Incident severity'
        required: true
        default: 'critical'
        type: choice
        options:
          - critical
          - high
          - medium
      delete_branches:
        description: 'Delete suspicious ai-task-* branches'
        required: false
        default: true
        type: boolean
      notify_webhook:
        description: 'Send webhook notification'
        required: false
        default: true
        type: boolean
  repository_dispatch:
    types:
      - emergency_stop
      - security_anomaly
      - critical_threat

jobs:
  stop-all-sessions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      canceled_runs: ${{ steps.cancel.outputs.canceled_count }}
      deleted_branches: ${{ steps.delete-branches.outputs.deleted_count }}
      incident_id: ${{ steps.report.outputs.incident_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Determine Inputs
        id: inputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REASON="${{ inputs.reason }}"
            SEVERITY="${{ inputs.severity }}"
            DELETE_BRANCHES="${{ inputs.delete_branches }}"
          else
            REASON="${{ github.event.client_payload.reason || 'Automated security trigger' }}"
            SEVERITY="${{ github.event.client_payload.severity || 'high' }}"
            DELETE_BRANCHES="${{ github.event.client_payload.delete_branches || 'true' }}"
          fi

          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "severity=$SEVERITY" >> $GITHUB_OUTPUT
          echo "delete_branches=$DELETE_BRANCHES" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Cancel All Running Workflows
        id: cancel
        env:
          GH_TOKEN: ${{ secrets.HUB_PAT || github.token }}
        run: |
          set -euo pipefail

          echo "::warning::Emergency stop initiated: ${{ steps.inputs.outputs.reason }}"

          CANCELED_COUNT=0
          CANCELED_IDS=""

          gh run list --repo "${{ github.repository }}" \
            --status in_progress \
            --limit 100 \
            --json databaseId,displayTitle,workflowName,createdAt \
            > running_workflows.json

          cat running_workflows.json

          for RUN_ID in $(cat running_workflows.json | jq -r '.[].databaseId'); do
            if [ "$RUN_ID" != "${{ github.run_id }}" ]; then
              echo "Canceling workflow run: $RUN_ID"
              gh run cancel "$RUN_ID" --repo "${{ github.repository }}" || true
              CANCELED_COUNT=$((CANCELED_COUNT + 1))
              CANCELED_IDS="${CANCELED_IDS}${RUN_ID},"
            fi
          done

          echo "canceled_count=$CANCELED_COUNT" >> $GITHUB_OUTPUT
          echo "canceled_ids=${CANCELED_IDS%,}" >> $GITHUB_OUTPUT

          echo "::warning::Canceled $CANCELED_COUNT workflow runs"

      - name: Delete Suspicious Branches
        id: delete-branches
        if: steps.inputs.outputs.delete_branches == 'true'
        env:
          GH_TOKEN: ${{ secrets.HUB_PAT || github.token }}
        run: |
          set -euo pipefail

          DELETED_COUNT=0
          DELETED_BRANCHES=""

          echo "Checking for suspicious ai-task-* branches created in last 24 hours..."

          YESTERDAY=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)

          gh api "repos/${{ github.repository }}/branches" \
            --jq '.[].name' 2>/dev/null | while read BRANCH; do
            if [[ "$BRANCH" == ai-task-* ]]; then
              BRANCH_INFO=$(gh api "repos/${{ github.repository }}/git/refs/heads/$BRANCH" 2>/dev/null || echo "")

              if [ -n "$BRANCH_INFO" ]; then
                echo "Deleting suspicious branch: $BRANCH"
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$BRANCH" 2>/dev/null || echo "Could not delete $BRANCH"
                echo "deleted_branches=${BRANCH}" >> deleted_branches.txt
              fi
            fi
          done

          if [ -f deleted_branches.txt ]; then
            DELETED_COUNT=$(wc -l < deleted_branches.txt | tr -d ' ')
            DELETED_BRANCHES=$(cat deleted_branches.txt | tr '\n' ',' | sed 's/,$//')
          fi

          echo "deleted_count=$DELETED_COUNT" >> $GITHUB_OUTPUT
          echo "deleted_branches=$DELETED_BRANCHES" >> $GITHUB_OUTPUT

          echo "::warning::Deleted $DELETED_COUNT suspicious branches"

      - name: Update Affected Issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh issue list \
            --repo "${{ github.repository }}" \
            --label "ai:in-progress" \
            --state open \
            --limit 50 \
            --json number,title \
            > affected_issues.json

          for ISSUE_NUMBER in $(cat affected_issues.json | jq -r '.[].number'); do
            echo "Updating issue #$ISSUE_NUMBER"

            gh issue edit "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --remove-label "ai:in-progress" \
              --add-label "ai:blocked,ai:security-alert" || true

            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "## Emergency Stop Triggered

              **Reason:** ${{ steps.inputs.outputs.reason }}
              **Severity:** ${{ steps.inputs.outputs.severity }}
              **Time:** ${{ steps.inputs.outputs.timestamp }}

              All automated operations have been suspended pending investigation.
              Manual review required before resuming work." || true
          done

      - name: Collect Evidence
        id: evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p incident_evidence

          cat running_workflows.json > incident_evidence/running_workflows.json || echo "[]" > incident_evidence/running_workflows.json

          gh run list \
            --repo "${{ github.repository }}" \
            --limit 50 \
            --json databaseId,status,conclusion,createdAt,updatedAt,workflowName,displayTitle \
            > incident_evidence/recent_runs.json || echo "[]" > incident_evidence/recent_runs.json

          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs \
            > incident_evidence/emergency_stop_logs.txt 2>/dev/null || echo "No logs available" > incident_evidence/emergency_stop_logs.txt

          echo "Evidence collected successfully"

      - name: Run Emergency Response Analysis
        id: analyze
        run: |
          set -euo pipefail

          cd "${{ github.workspace }}/scripts/python"

          python -c "
          import json
          import sys
          from datetime import datetime

          incident_data = {
              'reason': '${{ steps.inputs.outputs.reason }}',
              'severity': '${{ steps.inputs.outputs.severity }}',
              'timestamp': '${{ steps.inputs.outputs.timestamp }}',
              'repository': '${{ github.repository }}',
              'run_id': '${{ github.run_id }}',
              'triggered_by': '${{ github.actor }}',
              'event_type': '${{ github.event_name }}',
              'canceled_runs': ${{ steps.cancel.outputs.canceled_count || 0 }},
              'deleted_branches': ${{ steps.delete-branches.outputs.deleted_count || 0 }}
          }

          with open('incident_data.json', 'w') as f:
              json.dump(incident_data, f, indent=2)
          "

          if [ -f emergency_response.py ]; then
            python emergency_response.py \
              --incident-file incident_data.json \
              --output-format json \
              > emergency_analysis.json || echo "{}" > emergency_analysis.json

            echo "analysis<<EOF" >> $GITHUB_OUTPUT
            cat emergency_analysis.json >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "analysis={}" >> $GITHUB_OUTPUT
          fi

      - name: Create Incident Report
        id: report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          INCIDENT_ID="INC-$(date -u +%Y%m%d%H%M%S)"
          echo "incident_id=$INCIDENT_ID" >> $GITHUB_OUTPUT

          REPORT_FILE=$(mktemp)

          cat > "$REPORT_FILE" << 'REPORT_EOF'
          # Security Incident Report

          ## Incident Details

          | Field | Value |
          |-------|-------|
          REPORT_EOF

          cat >> "$REPORT_FILE" << REPORT_VALUES
          | **Incident ID** | ${INCIDENT_ID} |
          | **Severity** | ${{ steps.inputs.outputs.severity }} |
          | **Reason** | ${{ steps.inputs.outputs.reason }} |
          | **Timestamp** | ${{ steps.inputs.outputs.timestamp }} |
          | **Triggered By** | ${{ github.actor }} |
          REPORT_VALUES

          cat >> "$REPORT_FILE" << 'REPORT_ACTIONS'

          ## Actions Taken

          ### Workflows Canceled
          REPORT_ACTIONS

          cat >> "$REPORT_FILE" << REPORT_CANCELED
          - **Count**: ${{ steps.cancel.outputs.canceled_count }}
          - **IDs**: ${{ steps.cancel.outputs.canceled_ids }}
          REPORT_CANCELED

          cat >> "$REPORT_FILE" << 'REPORT_BRANCHES'

          ### Branches Deleted
          REPORT_BRANCHES

          cat >> "$REPORT_FILE" << REPORT_DELETED
          - **Count**: ${{ steps.delete-branches.outputs.deleted_count }}
          - **Branches**: ${{ steps.delete-branches.outputs.deleted_branches }}
          REPORT_DELETED

          cat >> "$REPORT_FILE" << 'REPORT_ANALYSIS'

          ## Emergency Response Analysis

          ```json
          REPORT_ANALYSIS

          cat >> "$REPORT_FILE" <<< "${{ steps.analyze.outputs.analysis }}"

          cat >> "$REPORT_FILE" << 'REPORT_FOOTER'
          ```

          ## Next Steps
          1. Review all affected issues and PRs
          2. Investigate root cause
          3. Update security measures if needed
          4. Manual approval required to resume operations

          ---

          *This incident report was automatically generated by the Emergency Stop workflow.*

          *Run ID: ${{ github.run_id }}*
          REPORT_FOOTER

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Security Incident - ${INCIDENT_ID}" \
            --body-file "$REPORT_FILE" \
            --label "ai:security-alert,incident,ai:p1" \
            > issue_url.txt

          ISSUE_URL=$(cat issue_url.txt)
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT

          echo "::warning::Incident report created: $ISSUE_URL"

          rm -f "$REPORT_FILE"

      - name: Upload Evidence
        uses: actions/upload-artifact@v7
        with:
          name: incident-evidence-${{ steps.report.outputs.incident_id }}
          path: |
            incident_evidence/
            scripts/python/incident_data.json
            scripts/python/emergency_analysis.json
          retention-days: 90

      - name: Send Webhook Notification
        if: steps.inputs.outputs.notify_webhook == 'true' && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.SECURITY_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          PAYLOAD=$(cat <<EOF
          {
            "incident_id": "${{ steps.report.outputs.incident_id }}",
            "severity": "${{ steps.inputs.outputs.severity }}",
            "reason": "${{ steps.inputs.outputs.reason }}",
            "timestamp": "${{ steps.inputs.outputs.timestamp }}",
            "repository": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}",
            "triggered_by": "${{ github.actor }}",
            "actions": {
              "workflows_canceled": ${{ steps.cancel.outputs.canceled_count }},
              "branches_deleted": ${{ steps.delete-branches.outputs.deleted_count }}
            },
            "issue_url": "${{ steps.report.outputs.issue_url }}"
          }
          EOF
          )

          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 || echo "Webhook notification failed"

      - name: Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY_EOF
          # Emergency Stop Executed

          ## Incident Details

          | Field | Value |
          |-------|-------|
          | **Incident ID** | ${{ steps.report.outputs.incident_id }} |
          | **Severity** | ${{ steps.inputs.outputs.severity }} |
          | **Reason** | ${{ steps.inputs.outputs.reason }} |
          | **Timestamp** | ${{ steps.inputs.outputs.timestamp }} |

          ## Actions Taken

          - **Workflows Canceled**: ${{ steps.cancel.outputs.canceled_count }}
          - **Branches Deleted**: ${{ steps.delete-branches.outputs.deleted_count }}
          - **Incident Report**: ${{ steps.report.outputs.issue_url }}
          SUMMARY_EOF
