name: Daily Audit Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to include in report'
        required: false
        default: '1'
        type: string

permissions:
  contents: read
  issues: write
  actions: read

env:
  AUDIT_LOG_PATH: audit.log
  AUDIT_ARTIFACTS_DIR: audit-artifacts

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir jsonschema

      - name: Download previous audit artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: audit-logs-*
          path: ${{ env.AUDIT_ARTIFACTS_DIR }}
          merge-multiple: true

      - name: Collect audit logs
        id: collect
        run: |
          python scripts/python/audit_logger.py \
            --log-path ${{ env.AUDIT_LOG_PATH }} \
            --artifacts-dir ${{ env.AUDIT_ARTIFACTS_DIR }} \
            --report \
            --days ${{ inputs.days || '1' }} > report-output.txt 2>&1

          if [ -f "audit-artifacts/report-*.json" ]; then
            REPORT_FILE=$(ls -t audit-artifacts/report-*.json | head -1)
            echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT
          fi

          cat report-output.txt

      - name: Generate statistics
        id: stats
        run: |
          python scripts/python/audit_logger.py \
            --log-path ${{ env.AUDIT_LOG_PATH }} \
            --artifacts-dir ${{ env.AUDIT_ARTIFACTS_DIR }} \
            --threat-summary \
            --days ${{ inputs.days || '1' }} > threat-summary.json

          echo "threat_summary_file=threat-summary.json" >> $GITHUB_OUTPUT

          cat threat-summary.json

      - name: Check for critical events
        id: critical
        run: |
          if [ -f "${{ env.AUDIT_ARTIFACTS_DIR }}/critical-events.jsonl" ]; then
            CRITICAL_COUNT=$(wc -l < "${{ env.AUDIT_ARTIFACTS_DIR }}/critical-events.jsonl")
            echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT

            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "has_critical=true" >> $GITHUB_OUTPUT
              echo "::warning::Found $CRITICAL_COUNT critical security events"
            fi
          else
            echo "critical_count=0" >> $GITHUB_OUTPUT
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Issue with report
        if: steps.critical.outputs.has_critical == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT_DATE=$(date -u '+%Y-%m-%d')
          CRITICAL_COUNT=${{ steps.critical.outputs.critical_count }}

          cat > issue-body.md << 'EOF'
          ## Security Audit Report - ${{ env.REPORT_DATE }}

          ### Summary
          **Critical Events Detected:** ${{ env.CRITICAL_COUNT }}

          ### Critical Events
          ```json
          EOF

          if [ -f "${{ env.AUDIT_ARTIFACTS_DIR }}/critical-events.jsonl" ]; then
            cat "${{ env.AUDIT_ARTIFACTS_DIR }}/critical-events.jsonl" >> issue-body.md
          fi

          cat >> issue-body.md << 'EOF'
          ```

          ### Threat Summary
          ```json
          EOF

          cat threat-summary.json >> issue-body.md

          cat >> issue-body.md << 'EOF'
          ```

          ---
          *This is an automated security audit report. Please review and take appropriate action.*
          EOF

          gh issue create \
            --title "[Security Audit] Critical Events Detected - $REPORT_DATE" \
            --body-file issue-body.md \
            --label "security,audit,automated" \
            --assignee "${{ github.repository_owner }}"

      - name: Create summary report issue
        if: steps.critical.outputs.has_critical != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT_DATE=$(date -u '+%Y-%m-%d')

          cat > issue-body.md << 'EOF'
          ## Daily Security Audit Report - ${{ env.REPORT_DATE }}

          ### Status
          No critical security events detected in the last 24 hours.

          ### Statistics
          EOF

          cat threat-summary.json >> issue-body.md

          cat >> issue-body.md << 'EOF'

          ---
          *This is an automated daily security audit report.*
          EOF

          gh issue create \
            --title "[Security Audit] Daily Report - $REPORT_DATE" \
            --body-file issue-body.md \
            --label "security,audit,automated"

      - name: Archive logs
        uses: actions/upload-artifact@v7
        with:
          name: audit-logs-${{ github.run_number }}
          path: |
            ${{ env.AUDIT_LOG_PATH }}
            ${{ env.AUDIT_ARTIFACTS_DIR }}/
            report-output.txt
            threat-summary.json
          retention-days: 90

      - name: Cleanup old artifacts
        run: |
          find ${{ env.AUDIT_ARTIFACTS_DIR }} -name "*.jsonl" -mtime +30 -delete || true

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: generate-report
    if: failure()
    steps:
      - name: Notify on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[Alert] Audit Report Generation Failed - $(date -u '+%Y-%m-%d')" \
            --body "The daily audit report generation workflow failed. Please investigate." \
            --label "alert,automated"
