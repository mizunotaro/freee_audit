name: Orchestrator Idle

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
        type: string

jobs:
  idle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check coverage improvement
        id: coverage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.target_repo }}"

          EXISTING=$(gh issue list --repo "$REPO" --label "ai:coverage" --state open --json number --jq 'length' 2>/dev/null || echo "0")

          if [ "$EXISTING" -eq 0 ]; then
            BODY="## Objective - Improve test coverage towards 100%. ## Tasks - [ ] Identify uncovered code paths - [ ] Write tests for uncovered areas - [ ] Verify coverage increase - Auto-generated by AI DevOps Platform"
            gh issue create --repo "$REPO" --title "🔧 Coverage Improvement" --body "$BODY" --label "ai:ready,ai:test,ai:p3,ai:coverage"
            
            echo "created=true" >> $GITHUB_OUTPUT
            echo "::notice::Created coverage improvement issue"
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "::notice::Coverage issue already exists"
          fi

      - name: Check security audit
        id: security
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.target_repo }}"
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)

          RECENT=$(gh issue list --repo "$REPO" --label "ai:security" --state all --json createdAt --jq "[.[] | select(.createdAt > \"$SINCE\")] | length" 2>/dev/null || echo "0")

          if [ "$RECENT" -eq 0 ]; then
            BODY="## Weekly Security Audit - ## Checklist - [ ] Review dependencies for vulnerabilities - [ ] Check for exposed secrets in code - [ ] Verify authentication mechanisms - [ ] Review input validation - Auto-generated by AI DevOps Platform"
            gh issue create --repo "$REPO" --title "🔒 Security Audit" --body "$BODY" --label "ai:ready,ai:security,ai:p1"
            
            echo "created=true" >> $GITHUB_OUTPUT
            echo "::notice::Created security audit issue"
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "::notice::Security audit recently completed"
          fi

      - name: Check quality standards audit
        id: quality
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.target_repo }}"
          SINCE=$(date -u -d '3 days ago' +%Y-%m-%dT%H:%M:%SZ)

          RECENT=$(gh issue list --repo "$REPO" --label "ai:quality" --state all --json createdAt --jq "[.[] | select(.createdAt > \"$SINCE\")] | length" 2>/dev/null || echo "0")

          if [ "$RECENT" -eq 0 ]; then
            BODY="## 10 Quality Standards Review - ### Checklist - 1. [ ] Stability - Timeouts, retries, graceful degradation - 2. [ ] Robustness - Input validation, error handling - 3. [ ] Reproducibility - Version control, deterministic processing - 4. [ ] Extensibility - Plugin patterns, interfaces - 5. [ ] Maintainability - Single responsibility, documentation - 6. [ ] Security - Sanitization, secret protection - 7. [ ] Performance - Caching, parallel processing - 8. [ ] Syntax Prevention - Strict mode, type definitions - 9. [ ] Function Design - Object arguments, Result types - 10. [ ] Consistency - Code patterns, architecture - Auto-generated by AI DevOps Platform"
            gh issue create --repo "$REPO" --title "📊 Quality Standards Audit" --body "$BODY" --label "ai:ready,ai:refactor,ai:p2,ai:quality"
            
            echo "created=true" >> $GITHUB_OUTPUT
            echo "::notice::Created quality audit issue"
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "::notice::Quality audit recently completed"
          fi

      - name: Summary
        run: |
          echo "## Idle Mode Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Created |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Improvement | ${{ steps.coverage.outputs.created == 'true' && '✅' || '⏭️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ steps.security.outputs.created == 'true' && '✅' || '⏭️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Audit | ${{ steps.quality.outputs.created == 'true' && '✅' || '⏭️' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Audit log
        if: always()
        uses: ./.github/actions/audit-log
        with:
          event-type: 'idle_mode'
          event-data: '{"coverage_issue_created": "${{ steps.coverage.outputs.created }}", "security_issue_created": "${{ steps.security.outputs.created }}", "quality_issue_created": "${{ steps.quality.outputs.created }}"}'
          severity: 'info'
