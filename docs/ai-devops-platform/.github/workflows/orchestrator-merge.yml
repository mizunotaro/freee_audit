name: Orchestrator Merge

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
        type: string
      issue_number:
        description: 'Issue number'
        required: true
        type: string

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.target_repo }}"
          NUMBER="${{ inputs.issue_number }}"

          PR=$(gh pr list --repo "$REPO" --state open --search "#$NUMBER" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")

          echo "pr=$PR" >> $GITHUB_OUTPUT

          if [ -n "$PR" ]; then
            echo "::notice::Found PR #$PR for issue #$NUMBER"
          else
            echo "::warning::No PR found for issue #$NUMBER"
          fi

      - name: Check auto-merge eligibility
        id: check
        if: steps.pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.target_repo }}"
          PR="${{ steps.pr.outputs.pr }}"

          PR_DATA=$(gh pr view --repo "$REPO" "$PR" --json labels,mergeStateStatus,reviewDecision --jq '.' 2>/dev/null || echo "{}")

          HAS_BLOCK_LABEL=$(echo "$PR_DATA" | jq '[.labels[].name] | index("do-not-merge") // false')
          MERGE_STATE=$(echo "$PR_DATA" | jq -r '.mergeStateStatus // "UNKNOWN"')

          if [ "$HAS_BLOCK_LABEL" != "false" ]; then
            echo "eligible=false" >> $GITHUB_OUTPUT
            echo "::warning::PR has do-not-merge label"
          elif [ "$MERGE_STATE" == "BLOCKED" ]; then
            echo "eligible=false" >> $GITHUB_OUTPUT
            echo "::warning::PR merge state is blocked"
          else
            echo "eligible=true" >> $GITHUB_OUTPUT
            echo "::notice::PR is eligible for auto-merge"
          fi

      - name: Auto merge
        if: steps.pr.outputs.pr != '' && steps.check.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.target_repo }}"
          PR="${{ steps.pr.outputs.pr }}"
          NUMBER="${{ inputs.issue_number }}"

          gh pr merge --repo "$REPO" "$PR" --auto --squash --delete-branch

          gh issue edit --repo "$REPO" "$NUMBER" --remove-label "ai:in-progress" --add-label "ai:done"

          BODY="🎉 **Auto-Merged** - PR #$PR has been merged automatically. Merge method: Squash - Branch deleted: Yes"
          gh issue comment --repo "$REPO" "$NUMBER" --body "$BODY"

      - name: Audit log
        if: always()
        uses: ./.github/actions/audit-log
        with:
          event-type: 'auto_merge'
          event-data: '{"issue_number": "${{ inputs.issue_number }}", "pr_number": "${{ steps.pr.outputs.pr }}", "eligible": "${{ steps.check.outputs.eligible }}"}'
          severity: 'info'
