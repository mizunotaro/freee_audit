name: Security Watcher

on:
  workflow_call:
    outputs:
      threats_found:
        description: 'Whether threats were found'
        value: ${{ jobs.scan-changes.outputs.threats_found }}
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      directory:
        description: 'Directory to scan'
        required: false
        default: '.'
        type: string
      extensions:
        description: 'File extensions to scan (space-separated)'
        required: false
        default: '.py .js .ts .yml .yaml .json .env .sh'
        type: string

jobs:
  scan-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      threats_found: ${{ steps.scan.outputs.threats_found }}
      threat_count: ${{ steps.scan.outputs.threat_count }}
      critical_count: ${{ steps.scan.outputs.critical_count }}
      high_count: ${{ steps.scan.outputs.high_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@628eae0335e8e7a1ee4935f2a3c9ab5e9c41fe6c
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Get Changed Files
        id: changed-files
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            FILES=$(git diff --name-only "$BEFORE" "$AFTER" | tr '\n' ' ' || echo "")
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD | tr '\n' ' ' || echo "")
          else
            FILES=""
          fi

          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run Threat Scanner
        id: scan
        run: |
          set -euo pipefail

          cd "${{ github.workspace }}/scripts/python"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DIRECTORY="${{ inputs.directory }}"
            EXTENSIONS="${{ inputs.extensions }}"
            python threat_scanner.py \
              --directory "$DIRECTORY" \
              --extensions $EXTENSIONS \
              --output json > scan_results.json
          elif [ -n "${{ steps.changed-files.outputs.files }}" ]; then
            FILES="${{ steps.changed-files.outputs.files }}"
            python threat_scanner.py \
              --files $FILES \
              --output json > scan_results.json
          else
            python threat_scanner.py \
              --directory . \
              --output json > scan_results.json
          fi

          cat scan_results.json

          THREATS_FOUND=$(python -c "import json; print(json.load(open('scan_results.json'))['threats_found'])")
          THREAT_COUNT=$(python -c "import json; print(json.load(open('scan_results.json'))['threat_count'])")
          CRITICAL_COUNT=$(python -c "import json; print(json.load(open('scan_results.json'))['severity_summary']['critical'])")
          HIGH_COUNT=$(python -c "import json; print(json.load(open('scan_results.json'))['severity_summary']['high'])")

          echo "threats_found=$THREATS_FOUND" >> $GITHUB_OUTPUT
          echo "threat_count=$THREAT_COUNT" >> $GITHUB_OUTPUT
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH_COUNT" >> $GITHUB_OUTPUT

      - name: Upload Scan Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: threat-scan-results
          path: scripts/python/scan_results.json
          retention-days: 30

      - name: Summary
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Threats Found**: ${{ steps.scan.outputs.threats_found }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Threats**: ${{ steps.scan.outputs.threat_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Critical**: ${{ steps.scan.outputs.critical_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **High**: ${{ steps.scan.outputs.high_count }}" >> $GITHUB_STEP_SUMMARY

  check-active-sessions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    outputs:
      anomalies_detected: ${{ steps.check.outputs.anomalies_detected }}
      anomaly_details: ${{ steps.check.outputs.anomaly_details }}

    steps:
      - name: List Running Workflows
        id: list
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh run list --repo "${{ github.repository }}" \
            --status in_progress \
            --limit 50 \
            --json databaseId,createdAt,displayTitle,workflowName \
            > active_runs.json

          cat active_runs.json

      - name: Check for Anomalies
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ANOMALIES="[]"
          ANOMALY_DETECTED="false"

          ONE_HOUR_AGO=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)
          THIRTY_MIN_AGO=$(date -u -d '30 minutes ago' +%Y-%m-%dT%H:%M:%SZ)

          LONG_RUNNING=$(cat active_runs.json | jq -r ".[] | select(.createdAt < \"$ONE_HOUR_AGO\") | .databaseId")

          if [ -n "$LONG_RUNNING" ]; then
            ANOMALY_DETECTED="true"
            ANOMALIES=$(echo "$ANOMALIES" | jq '. + [{"type": "long_running", "ids": "'"$LONG_RUNNING"'"}]')
            echo "::warning::Long running workflows detected: $LONG_RUNNING"
          fi

          DUPLICATE_RUNS=$(cat active_runs.json | jq -r 'group_by(.workflowName) | .[] | select(length > 2) | .[0].workflowName')

          if [ -n "$DUPLICATE_RUNS" ]; then
            ANOMALY_DETECTED="true"
            ANOMALIES=$(echo "$ANOMALIES" | jq '. + [{"type": "duplicate_runs", "workflows": "'"$DUPLICATE_RUNS"'"}]')
            echo "::warning::Multiple duplicate workflows detected: $DUPLICATE_RUNS"
          fi

          echo "anomalies_detected=$ANOMALY_DETECTED" >> $GITHUB_OUTPUT
          echo "anomaly_details=$ANOMALIES" >> $GITHUB_OUTPUT

      - name: Alert if Needed
        if: steps.check.outputs.anomalies_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error::Anomalies detected in active sessions: ${{ steps.check.outputs.anomaly_details }}"

          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            -f event_type='security_anomaly' \
            -f client_payload='{"anomalies": ${{ steps.check.outputs.anomaly_details }}}' || true

      - name: Summary
        run: |
          echo "## Active Sessions Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Anomalies Detected**: ${{ steps.check.outputs.anomalies_detected }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details**: ${{ steps.check.outputs.anomaly_details }}" >> $GITHUB_STEP_SUMMARY

  threat-response:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-changes, check-active-sessions]
    if: needs.scan-changes.outputs.threats_found == 'true' || needs.check-active-sessions.outputs.anomalies_detected == 'true'
    permissions:
      contents: write
      actions: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@628eae0335e8e7a1ee4935f2a3c9ab5e9c41fe6c
        with:
          fetch-depth: 0

      - name: Download Scan Results
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: threat-scan-results
          path: scan_results

      - name: Cancel Workflows if Critical/High Threats
        if: needs.scan-changes.outputs.critical_count > 0 || needs.scan-changes.outputs.high_count > 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          CRITICAL="${{ needs.scan-changes.outputs.critical_count }}"
          HIGH="${{ needs.scan-changes.outputs.high_count }}"

          echo "::error::Critical/High threats detected! Canceling workflows..."

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RUN_ID="${{ github.run_id }}"
            gh run cancel "$RUN_ID" || true
            
            if [ -n "${{ github.head_ref }}" ]; then
              BRANCH="${{ github.head_ref }}"
              git push origin --delete "$BRANCH" || echo "Branch already deleted or cannot delete"
            fi
          fi

          gh run list --repo "${{ github.repository }}" \
            --status in_progress \
            --json databaseId \
            --jq '.[].databaseId' | while read RUN_ID; do
              echo "Canceling run: $RUN_ID"
              gh run cancel "$RUN_ID" || true
            done

      - name: Update Labels
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"

          gh pr edit "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --add-label "security:threat-detected"

          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "## ⚠️ Security Threat Detected

            **Scan Results:**
            - Critical: ${{ needs.scan-changes.outputs.critical_count }}
            - High: ${{ needs.scan-changes.outputs.high_count }}
            - Total: ${{ needs.scan-changes.outputs.threat_count }}

            **Action Required:** Manual review needed before proceeding."

      - name: Send Notifications
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          CRITICAL="${{ needs.scan-changes.outputs.critical_count }}"
          HIGH="${{ needs.scan-changes.outputs.high_count }}"
          ANOMALIES="${{ needs.check-active-sessions.outputs.anomalies_detected }}"

          MESSAGE="Security Alert: "

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            MESSAGE="${MESSAGE}Threats detected (Critical: $CRITICAL, High: $HIGH)"
          fi

          if [ "$ANOMALIES" = "true" ]; then
            MESSAGE="${MESSAGE} Anomalies detected in active sessions"
          fi

          echo "::error::$MESSAGE"

          if [ -n "${{ secrets.SECURITY_WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.SECURITY_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"$MESSAGE\", \"repository\": \"${{ github.repository }}\", \"run_id\": \"${{ github.run_id }}\"}" || true
          fi

      - name: Create Security Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          CRITICAL="${{ needs.scan-changes.outputs.critical_count }}"
          HIGH="${{ needs.scan-changes.outputs.high_count }}"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "[Security] Threat Detected - $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --body "## Security Threat Detected

              **Scan Results:**
              - Critical: $CRITICAL
              - High: $HIGH
              - Total: ${{ needs.scan-changes.outputs.threat_count }}

              **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

              **Action Required:** Immediate review and remediation needed." \
              --label "ai:security,ai:p1" || true
          fi

      - name: Summary
        run: |
          echo "## Threat Response Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Action Taken**: Workflows canceled, labels updated, notifications sent" >> $GITHUB_STEP_SUMMARY
          echo "- **Critical Threats**: ${{ needs.scan-changes.outputs.critical_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **High Threats**: ${{ needs.scan-changes.outputs.high_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Session Anomalies**: ${{ needs.check-active-sessions.outputs.anomalies_detected }}" >> $GITHUB_STEP_SUMMARY
