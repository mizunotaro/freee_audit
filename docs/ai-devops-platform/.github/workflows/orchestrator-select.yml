name: Orchestrator Select

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
        type: string
    outputs:
      has_task:
        description: 'Whether a task was found'
        value: ${{ jobs.select.outputs.has_task }}
      issue_number:
        description: 'Selected issue number'
        value: ${{ jobs.select.outputs.issue_number }}
      issue_title:
        description: 'Selected issue title'
        value: ${{ jobs.select.outputs.issue_title }}
      issue_body:
        description: 'Selected issue body (base64)'
        value: ${{ jobs.select.outputs.issue_body_b64 }}
      priority:
        description: 'Task priority'
        value: ${{ jobs.select.outputs.priority }}

jobs:
  select:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    outputs:
      has_task: ${{ steps.select.outputs.has_task }}
      issue_number: ${{ steps.select.outputs.issue_number }}
      issue_title: ${{ steps.select.outputs.issue_title }}
      issue_body_b64: ${{ steps.select.outputs.issue_body_b64 }}
      priority: ${{ steps.select.outputs.priority }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: true

      - name: Select next task
        id: select
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ inputs.target_repo }}"

          echo "### Task Selection" >> $GITHUB_STEP_SUMMARY
          echo "Repository: $REPO" >> $GITHUB_STEP_SUMMARY

          ISSUE=""
          PRIORITY=""

          for P in "ai:p1" "ai:p2" "ai:p3"; do
            FOUND=$(gh issue list --repo "$REPO" --label "ai:ready,$P" --state open --limit 1 --json number,title,body --jq '.[0] // empty' 2>/dev/null || echo "")
            if [ -n "$FOUND" ]; then
              ISSUE="$FOUND"
              PRIORITY="${P#ai:}"
              echo "Found issue with priority: $P" >> $GITHUB_STEP_SUMMARY
              break
            fi
          done

          if [ -z "$ISSUE" ]; then
            ISSUE=$(gh issue list --repo "$REPO" --label "ai:ready" --state open --limit 1 --json number,title,body --jq '.[0] // empty' 2>/dev/null || echo "")
            PRIORITY="default"
          fi

          if [ -z "$ISSUE" ]; then
            echo "::notice::No ai:ready issues found"
            echo "has_task=false" >> $GITHUB_OUTPUT
            echo "No tasks found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          NUMBER=$(echo "$ISSUE" | jq -r '.number')
          TITLE=$(echo "$ISSUE" | jq -r '.title')
          BODY=$(echo "$ISSUE" | jq -r '.body // empty')

          echo "has_task=true" >> $GITHUB_OUTPUT
          echo "issue_number=$NUMBER" >> $GITHUB_OUTPUT
          echo "priority=$PRIORITY" >> $GITHUB_OUTPUT

          SANITIZED_TITLE=$(echo "$TITLE" | sed 's/[[:cntrl:]]//g' | tr '\n' ' ')
          echo "issue_title=$SANITIZED_TITLE" >> $GITHUB_OUTPUT

          SANITIZED_BODY=$(echo "$BODY" | tr -d '\000-\037\177' | head -c 10000 | base64 -w0)
          echo "issue_body_b64=$SANITIZED_BODY" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Selected Issue:** #$NUMBER" >> $GITHUB_STEP_SUMMARY
          echo "- Title: $SANITIZED_TITLE" >> $GITHUB_STEP_SUMMARY
          echo "- Priority: $PRIORITY" >> $GITHUB_STEP_SUMMARY

      - name: Update issue labels
        if: steps.select.outputs.has_task == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.target_repo }}"
          NUMBER="${{ steps.select.outputs.issue_number }}"

          gh issue edit --repo "$REPO" "$NUMBER" --remove-label "ai:ready" --add-label "ai:in-progress"

          BODY="🚀 **Execution Started** - Run ID: ${{ github.run_id }} - Started: $(date -u +%Y-%m-%dT%H:%M:%SZ) - Priority: ${{ steps.select.outputs.priority }}"
          gh issue comment --repo "$REPO" "$NUMBER" --body "$BODY"

      - name: Audit log
        if: always() && steps.select.outputs.has_task == 'true'
        uses: ./.github/actions/audit-log
        with:
          event-type: 'task_selected'
          event-data: '{"issue_number": "${{ steps.select.outputs.issue_number }}", "priority": "${{ steps.select.outputs.priority }}", "repository": "${{ inputs.target_repo }}"}'
          severity: 'info'
