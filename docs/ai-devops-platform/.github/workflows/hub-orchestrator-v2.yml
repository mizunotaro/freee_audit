name: AI DevOps Hub Orchestrator V2 (Multi-Agent)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      repository:
        description: 'Target repository (owner/repo)'
        required: false
        default: ''
      issue_number:
        description: 'Specific issue number'
        required: false
        default: ''
      force:
        description: 'Force run'
        required: false
        default: 'false'
        type: boolean
      workflow:
        description: 'Workflow type: standard, complex, or recovery'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - standard
          - complex
          - recovery

concurrency:
  group: ai-hub-orchestrator-v2
  cancel-in-progress: false

env:
  ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      max_concurrency: ${{ steps.schedule.outputs.max_concurrency }}
      enabled_repos: ${{ steps.repos.outputs.enabled_repos }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check automation
        id: check
        run: |
          MODE="${{ vars.AI_AUTOMATION_MODE }}"
          FORCE="${{ github.event.inputs.force }}"
          if [[ "$MODE" == "disabled" && "$FORCE" != "true" ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "should_run=true" >> $GITHUB_OUTPUT

      - name: Calculate concurrency
        id: schedule
        run: |
          HOUR_JST=$(( ($(date -u +%H) + 9) % 24 ))
          DOW=$(date -u +%u)
          if [[ $DOW -le 5 && $HOUR_JST -ge 8 && $HOUR_JST -lt 19 ]]; then
            echo "max_concurrency=2" >> $GITHUB_OUTPUT
          else
            echo "max_concurrency=3" >> $GITHUB_OUTPUT
          fi

      - name: Load repos
        id: repos
        run: |
          if [ -f "config/target-repos.json" ]; then
            REPOS=$(jq -c '[.repositories[] | select(.enabled == true)]' config/target-repos.json)
          else
            REPOS='[{"name":"${{ github.repository }}","priority":1}]'
          fi
          echo "enabled_repos=$REPOS" >> $GITHUB_OUTPUT

  scan:
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      tasks: ${{ steps.scan.outputs.tasks }}
      count: ${{ steps.scan.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for tasks
        id: scan
        env:
          GH_TOKEN: ${{ secrets.HUB_PAT }}
          REPOS: ${{ needs.preflight.outputs.enabled_repos }}
        run: |
          TASKS="[]"
          for repo in $(echo "$REPOS" | jq -r '.[].name'); do
            echo "Scanning $repo..."
            ISSUES=$(gh issue list --repo "$repo" --label "ai:ready" --state open --json number,title,body,labels,createdAt --limit 20 2>/dev/null || echo '[]')
            for row in $(echo "$ISSUES" | jq -r '.[] | @base64'); do
              issue=$(echo "$row" | base64 -d)
              num=$(echo "$issue" | jq -r '.number')
              labels=$(echo "$issue" | jq -r '[.labels[].name]')
              if echo "$labels" | jq -e 'index("ai:in-progress") or index("ai:blocked")' > /dev/null 2>&1; then
                continue
              fi
              priority="medium"
              if echo "$labels" | jq -e 'index("priority-critical")' > /dev/null 2>&1; then
                priority="critical"
              elif echo "$labels" | jq -e 'index("priority-high")' > /dev/null 2>&1; then
                priority="high"
              elif echo "$labels" | jq -e 'index("priority-low")' > /dev/null 2>&1; then
                priority="low"
              fi
              title=$(echo "$issue" | jq -r '.title')
              body=$(echo "$issue" | jq -r '.body // ""' | tr '\n' ' ' | cut -c1-500)
              createdAt=$(echo "$issue" | jq -r '.createdAt')
              TASKS=$(echo "$TASKS" | jq --arg r "$repo" --arg n "$num" --arg t "$title" --arg b "$body" --arg p "$priority" --arg c "$createdAt" '. + [{repo: $r, num: $n, title: $t, body: $b, priority: $p, createdAt: $c}]')
            done
          done
          PRIORITY_ORDER='{"critical":0,"high":1,"medium":2,"low":3}'
          TASKS=$(echo "$TASKS" | jq --argjson o "$PRIORITY_ORDER" 'sort_by([$o[.priority]])')
          echo "tasks=$(echo "$TASKS" | jq -c '.')" >> $GITHUB_OUTPUT
          echo "count=$(echo "$TASKS" | jq 'length')" >> $GITHUB_OUTPUT

  analyze:
    needs: [preflight, scan]
    if: needs.scan.outputs.count > 0
    runs-on: ubuntu-latest
    outputs:
      tasks_with_workflow: ${{ steps.analyze.outputs.tasks }}
    steps:
      - name: Analyze task complexity
        id: analyze
        run: |
          TASKS='${{ needs.scan.outputs.tasks }}'
          WORKFLOW_TYPE="${{ github.event.inputs.workflow || 'auto' }}"

          ANALYZED="[]"

          for row in $(echo "$TASKS" | jq -r '.[] | @base64'); do
            task=$(echo "$row" | base64 -d)
            repo=$(echo "$task" | jq -r '.repo')
            num=$(echo "$task" | jq -r '.num')
            title=$(echo "$task" | jq -r '.title')
            body=$(echo "$task" | jq -r '.body')
            
            if [ "$WORKFLOW_TYPE" != "auto" ]; then
              workflow="$WORKFLOW_TYPE"
            else
              workflow="standard"
              
              BODY_LEN=${#body}
              TITLE_WORDS=$(echo "$title" | wc -w)
              
              if [[ "$title" == *"refactor"* ]] || [[ "$title" == *"migration"* ]] || [[ "$body" == *"multiple files"* ]]; then
                workflow="complex"
              fi
              
              if [ "$BODY_LEN" -gt 1000 ] || [ "$TITLE_WORDS" -gt 10 ]; then
                workflow="complex"
              fi
              
              if echo "$body" | grep -qiE "implement.*and.*and.*and"; then
                workflow="complex"
              fi
            fi
            
            session_id="sess-$(date +%s)-$num"
            
            ANALYZED=$(echo "$ANALYZED" | jq --arg r "$repo" --arg n "$num" --arg t "$title" --arg b "$body" --arg w "$workflow" --arg s "$session_id" '. + [{repo: $r, num: $n, title: $t, body: $b, workflow: $w, sessionId: $s}]')
          done

          echo "tasks=$(echo "$ANALYZED" | jq -c '.')" >> $GITHUB_OUTPUT

  execute-standard:
    needs: analyze
    if: contains(needs.analyze.outputs.tasks_with_workflow, '"workflow":"standard"')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.preflight.outputs.max_concurrency) }}
      matrix:
        task: ${{ fromJson(needs.analyze.outputs.tasks_with_workflow) }}
    steps:
      - name: Checkout target
        if: matrix.task.workflow == 'standard'
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.task.repo }}
          token: ${{ secrets.HUB_PAT }}
          fetch-depth: 0

      - name: Setup
        if: matrix.task.workflow == 'standard'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        if: matrix.task.workflow == 'standard'
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          fi
        continue-on-error: true

      - name: Mark in progress
        if: matrix.task.workflow == 'standard'
        env:
          GH_TOKEN: ${{ secrets.HUB_PAT }}
        run: |
          gh issue edit ${{ matrix.task.num }} --repo ${{ matrix.task.repo }} --add-label "ai:in-progress" --remove-label "ai:ready" 2>/dev/null || true
          SESSION_ID="${{ matrix.task.sessionId }}"
          gh issue comment ${{ matrix.task.num }} --repo ${{ matrix.task.repo }} --body "🤖 **Builder Agent Started** - Session: ${SESSION_ID} - Workflow: Standard - Model: GLM5" 2>/dev/null || true

      - name: Create branch
        if: matrix.task.workflow == 'standard'
        id: branch
        run: |
          slug=$(echo "${{ matrix.task.title }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40)
          branch="ai-task-${{ matrix.task.num }}-${slug}"
          git checkout -b "$branch" 2>/dev/null || git checkout "$branch"
          echo "name=$branch" >> $GITHUB_OUTPUT

      - name: Run Builder Agent
        if: matrix.task.workflow == 'standard'
        id: builder
        timeout-minutes: 20
        uses: anomalyco/opencode/github@v1.1.44
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        with:
          model: zai-coding-plan/glm-5
          prompt: |
            ## Implementation Task

            **Issue #${{ matrix.task.num }}**: ${{ matrix.task.title }}

            **Description**:
            ${{ matrix.task.body }}

            **Session ID**: ${{ matrix.task.sessionId }}

            ### Requirements:
            1. Implement the feature/fix as described
            2. Follow existing code patterns and conventions
            3. Write comprehensive tests
            4. Ensure all quality gates pass

            ### Quality Standards:
            - TypeScript strict mode compliance
            - ESLint rules (0 warnings)
            - Test coverage >= 80%
            - Clean build

            ### Output:
            After implementation, provide a summary of changes made.
          token: ${{ secrets.HUB_PAT }}
        continue-on-error: true

      - name: Run Quality Gates
        if: matrix.task.workflow == 'standard'
        id: quality
        continue-on-error: true
        run: |
          echo "### Quality Gates" >> $GITHUB_STEP_SUMMARY

          TSC="fail"; ESLINT="fail"; JEST="fail"; BUILD="fail"

          if pnpm tsc --noEmit 2>&1; then TSC="pass"; echo "✅ tsc: pass" >> $GITHUB_STEP_SUMMARY; fi
          if pnpm eslint src/ --max-warnings=0 2>&1; then ESLINT="pass"; echo "✅ eslint: pass" >> $GITHUB_STEP_SUMMARY; fi
          if pnpm jest --passWithNoTests 2>&1; then JEST="pass"; echo "✅ jest: pass" >> $GITHUB_STEP_SUMMARY; fi
          if pnpm build 2>&1; then BUILD="pass"; echo "✅ build: pass" >> $GITHUB_STEP_SUMMARY; fi

          if [ "$TSC" == "pass" ] && [ "$ESLINT" == "pass" ] && [ "$JEST" == "pass" ] && [ "$BUILD" == "pass" ]; then
            echo "result=pass" >> $GITHUB_OUTPUT
          else
            echo "result=fail" >> $GITHUB_OUTPUT
          fi

          echo "tsc=$TSC" >> $GITHUB_OUTPUT
          echo "eslint=$ESLINT" >> $GITHUB_OUTPUT
          echo "jest=$JEST" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Run Reviewer Agent
        if: matrix.task.workflow == 'standard' && steps.quality.outputs.result == 'pass'
        id: review
        uses: anomalyco/opencode/github@v1.1.44
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        with:
          model: zai-coding-plan/glm-5
          prompt: |
            ## Code Review Task

            Review the implementation for Issue #${{ matrix.task.num }}.

            ### Review Criteria (10 Quality Standards):
            1. Stability - Error handling, timeouts, retries
            2. Robustness - Input validation, edge cases
            3. Reproducibility - Deterministic processing
            4. Extensibility - Modular design
            5. Maintainability - Code clarity
            6. Security - Input sanitization, data protection
            7. Performance - Caching, optimization
            8. Syntax Prevention - Type safety
            9. Function Design - Clean interfaces
            10. Consistency - Pattern adherence

            ### Output Format:
            ```json
            {
              "passed": true|false,
              "overall_score": 0-100,
              "summary": "Brief review summary"
            }
            ```
          token: ${{ secrets.HUB_PAT }}
        continue-on-error: true

      - name: Create PR on Success
        if: matrix.task.workflow == 'standard' && steps.quality.outputs.result == 'pass'
        env:
          GH_TOKEN: ${{ secrets.HUB_PAT }}
        run: |
          git push origin ${{ steps.branch.outputs.name }} 2>/dev/null || true

          pr_url=$(gh pr create --repo ${{ matrix.task.repo }} \
            --title "feat: ${{ matrix.task.title }}" \
            --body "## Summary
          Closes #${{ matrix.task.num }}

          **Session ID**: ${{ matrix.task.sessionId }}
          **Workflow**: Standard
          **Model**: GLM5

          ### Quality Gates
          - TypeScript: ✅
          - ESLint: ✅
          - Tests: ✅
          - Build: ✅

          ### Review Score
          ${{ steps.review.outputs.response }}

          ---
          *Generated by AI DevOps Hub V2*" \
            --base main \
            --label "ai-generated" 2>/dev/null || echo "")

          if [ -n "$pr_url" ]; then
            gh issue comment ${{ matrix.task.num }} --repo ${{ matrix.task.repo }} --body "✅ **Implementation Complete**

          PR: $pr_url

          All quality gates passed. Review completed." 2>/dev/null || true
            
            gh issue edit ${{ matrix.task.num }} --repo ${{ matrix.task.repo }} \
              --add-label "ai:pr-open" \
              --remove-label "ai:in-progress" 2>/dev/null || true
          fi

      - name: Trigger Recovery on Failure
        if: matrix.task.workflow == 'standard' && steps.quality.outputs.result != 'pass'
        env:
          GH_TOKEN: ${{ secrets.HUB_PAT }}
        run: |
          FAILURE_CONTEXT=$(jq -n \
            --arg tsc "${{ steps.quality.outputs.tsc }}" \
            --arg eslint "${{ steps.quality.outputs.eslint }}" \
            --arg jest "${{ steps.quality.outputs.jest }}" \
            --arg build "${{ steps.quality.outputs.build }}" \
            --arg branch "${{ steps.branch.outputs.name }}" \
            '{qualityGates: {tsc: $tsc, eslint: $eslint, jest: $jest, build: $build}, branch: $branch, attempts: 1}')

          gh issue comment ${{ matrix.task.num }} --repo ${{ matrix.task.repo }} --body "⚠️ **Quality Gates Failed**

          - TypeScript: ${{ steps.quality.outputs.tsc }}
          - ESLint: ${{ steps.quality.outputs.eslint }}
          - Tests: ${{ steps.quality.outputs.jest }}
          - Build: ${{ steps.quality.outputs.build }}

          Initiating Recovery Agent..." 2>/dev/null || true

          echo "failure_context=$FAILURE_CONTEXT" >> $GITHUB_ENV
          echo "needs_recovery=true" >> $GITHUB_ENV

  execute-complex:
    needs: analyze
    if: contains(needs.analyze.outputs.tasks_with_workflow, '"workflow":"complex"')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        task: ${{ fromJson(needs.analyze.outputs.tasks_with_workflow) }}
    steps:
      - name: Checkout target
        if: matrix.task.workflow == 'complex'
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.task.repo }}
          token: ${{ secrets.HUB_PAT }}
          fetch-depth: 0

      - name: Run PM Agent for Decomposition
        if: matrix.task.workflow == 'complex'
        id: pm
        uses: anomalyco/opencode/github@v1.1.44
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        with:
          model: zai-coding-plan/glm-5
          prompt: |
            ## PM Task: Decompose Complex Task

            **Issue #${{ matrix.task.num }}**: ${{ matrix.task.title }}

            **Description**:
            ${{ matrix.task.body }}

            **Session ID**: ${{ matrix.task.sessionId }}

            ### Your Role:
            Analyze this task and decompose it into smaller, manageable subtasks.

            ### Rules:
            - Maximum 5 subtasks
            - Each subtask should be completable in a single session
            - Identify dependencies between subtasks
            - Mark which subtasks can be parallelized

            ### Output Format:
            ```json
            {
              "complexity": "high",
              "subtasks": [
                {
                  "id": "subtask-1",
                  "title": "Subtask title",
                  "description": "Detailed description",
                  "dependencies": [],
                  "parallelizable": true
                }
              ],
              "executionPlan": "Step-by-step execution plan"
            }
            ```
          token: ${{ secrets.HUB_PAT }}

      - name: Create subtask issues
        if: matrix.task.workflow == 'complex'
        env:
          GH_TOKEN: ${{ secrets.HUB_PAT }}
        run: |
          PM_OUTPUT="${{ steps.pm.outputs.response }}"

          echo "$PM_OUTPUT" | jq -c '.subtasks[]' | while read subtask; do
            TITLE=$(echo "$subtask" | jq -r '.title')
            DESC=$(echo "$subtask" | jq -r '.description')
            DEPS=$(echo "$subtask" | jq -c '.dependencies')
            
            BODY="## Parent Issue
            #${{ matrix.task.num }}
            
            ## Description
            $DESC
            
            ## Dependencies
            \`\`\`json
            $DEPS
            \`\`\`
            
            ## Session ID
            ${{ matrix.task.sessionId }}"
            
            gh issue create --repo ${{ matrix.task.repo }} \
              --title "[Subtask] $TITLE" \
              --body "$BODY" \
              --label "ai:ready,ai:subtask" || true
          done

          gh issue comment ${{ matrix.task.num }} --repo ${{ matrix.task.repo }} --body "📋 **Task Decomposed**

          PM Agent has decomposed this complex task into smaller subtasks.

          Check the newly created issues for individual subtasks." 2>/dev/null || true

  summary:
    needs: [preflight, scan, analyze, execute-standard, execute-complex]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## AI Hub V2 Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Max concurrency: ${{ needs.preflight.outputs.max_concurrency }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tasks found: ${{ needs.scan.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Standard workflow: ${{ needs.execute-standard.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Complex workflow: ${{ needs.execute-complex.result }}" >> $GITHUB_STEP_SUMMARY
