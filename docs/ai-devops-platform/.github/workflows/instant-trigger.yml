name: Instant Trigger

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    if: |
      (contains(github.event.comment.body, '/opencode') ||
      contains(github.event.comment.body, '/oc')) &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      actions: write
    steps:
      - name: Check Priority
        id: check
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          if echo "$COMMENT" | grep -qiE "(今すぐ|immediately|asap|緊急|urgent)"; then
            echo "priority=immediate" >> $GITHUB_OUTPUT
          else
            echo "priority=high" >> $GITHUB_OUTPUT
          fi

      - name: Add Ready Label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ISSUE="${{ github.event.issue.number }}"

          gh issue edit --repo "${{ github.repository }}" "$ISSUE" --add-label "ai:ready"
          gh issue comment --repo "${{ github.repository }}" "$ISSUE" --body "🚀 **Instant Trigger Activated** - Priority: ${{ steps.check.outputs.priority }} - Triggered by: @${{ github.actor }}"

      - name: Trigger Orchestrator
        if: steps.check.outputs.priority == 'immediate'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: orchestrator.yml
          token: ${{ github.token }}
          inputs: '{"force_run": true}'
