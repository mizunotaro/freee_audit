name: Resource Cleanup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual deletion)'
        required: false
        default: 'false'
        type: boolean
      max_age_days:
        description: 'Maximum age in days for branches'
        required: false
        default: '7'

env:
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
  MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '7' }}

jobs:
  cleanup-branches:
    name: Cleanup Orphaned Branches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      deleted_count: ${{ steps.cleanup.outputs.deleted_count }}
      skipped_count: ${{ steps.cleanup.outputs.skipped_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "AI DevOps Bot"
          git config user.email "ai-devops@example.com"

      - name: Cleanup orphaned ai-task branches
        id: cleanup
        run: |
          echo "### Branch Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Mode: $([ \"$DRY_RUN\" == 'true' ] && echo 'DRY RUN' || echo 'LIVE')" >> $GITHUB_STEP_SUMMARY
          echo "Max age: $MAX_AGE_DAYS days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DELETED=0
          SKIPPED=0

          git fetch --prune origin

          for branch in $(git branch -r | grep 'origin/ai-task-' | sed 's/origin\//'); do
            BRANCH_NAME=$(echo "$branch" | xargs)
            
            LAST_COMMIT_DATE=$(git log -1 --format=%ci "origin/$BRANCH_NAME" 2>/dev/null || echo "")
            
            if [ -z "$LAST_COMMIT_DATE" ]; then
              echo "- ⚠️ $BRANCH_NAME: Cannot determine last commit date"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            
            BRANCH_TIMESTAMP=$(date -d "$LAST_COMMIT_DATE" +%s 2>/dev/null || echo "0")
            CURRENT_TIMESTAMP=$(date +%s)
            AGE_DAYS=$(( (CURRENT_TIMESTAMP - BRANCH_TIMESTAMP) / 86400 ))
            
            if [ $AGE_DAYS -gt $MAX_AGE_DAYS ]; then
              PR_EXISTS=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH_NAME" --state all --json number --jq 'length' 2>/dev/null || echo "0")
              
              if [ "$PR_EXISTS" -eq 0 ]; then
                if [ "$DRY_RUN" == "true" ]; then
                  echo "- 🗑️ $BRANCH_NAME: Would delete (${AGE_DAYS} days old, no PR)" >> $GITHUB_STEP_SUMMARY
                else
                  echo "::notice::Deleting branch $BRANCH_NAME (${AGE_DAYS} days old)"
                  if git push origin --delete "$BRANCH_NAME" 2>&1; then
                    echo "- ✅ $BRANCH_NAME: Deleted (${AGE_DAYS} days old)" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "- ❌ $BRANCH_NAME: Failed to delete" >> $GITHUB_STEP_SUMMARY
                    SKIPPED=$((SKIPPED + 1))
                    continue
                  fi
                fi
                DELETED=$((DELETED + 1))
              else
                echo "- ⏭️ $BRANCH_NAME: Skipped (has PR, ${AGE_DAYS} days old)" >> $GITHUB_STEP_SUMMARY
                SKIPPED=$((SKIPPED + 1))
              fi
            else
              echo "- ✓ $BRANCH_NAME: Kept (${AGE_DAYS} days old)" >> $GITHUB_STEP_SUMMARY
              SKIPPED=$((SKIPPED + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Summary:** $DELETED deleted, $SKIPPED kept/skipped" >> $GITHUB_STEP_SUMMARY

          echo "deleted_count=$DELETED" >> $GITHUB_OUTPUT
          echo "skipped_count=$SKIPPED" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  cleanup-cache:
    name: Cleanup GitHub Actions Cache
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Clear old caches
        run: |
          echo "### Cache Cleanup" >> $GITHUB_STEP_SUMMARY

          CACHES=$(gh cache list --repo "${{ github.repository }}" --json id,createdAt --jq '.[] | select(.createdAt < (now - 604800) | strftime("%Y-%m-%dT%H:%M:%SZ")) | .id' 2>/dev/null || echo "")

          DELETED=0
          for cache_id in $CACHES; do
            if [ "$DRY_RUN" == "true" ]; then
              echo "- Would delete cache: $cache_id" >> $GITHUB_STEP_SUMMARY
            else
              if gh cache delete --repo "${{ github.repository }}" "$cache_id" 2>&1; then
                echo "- ✅ Deleted cache: $cache_id" >> $GITHUB_STEP_SUMMARY
                DELETED=$((DELETED + 1))
              fi
            fi
          done

          if [ $DELETED -eq 0 ]; then
            echo "- No old caches to delete" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  cleanup-issues:
    name: Cleanup Stale Labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix orphaned labels
        run: |
          echo "### Issue Label Cleanup" >> $GITHUB_STEP_SUMMARY

          FIXED=0

          ORPHANED=$(gh issue list --repo "${{ github.repository }}" --label "ai:pr-open" --state open --json number --jq '.[].number' 2>/dev/null || echo "")

          for issue in $ORPHANED; do
            PR=$(gh pr list --repo "${{ github.repository }}" --state all --search "#$issue" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
            
            if [ -z "$PR" ]; then
              if [ "$DRY_RUN" == "true" ]; then
                echo "- Would fix issue #$issue (orphaned ai:pr-open label)" >> $GITHUB_STEP_SUMMARY
              else
                gh issue edit --repo "${{ github.repository }}" "$issue" --remove-label "ai:pr-open" --add-label "ai:ready" 2>&1
                gh issue comment --repo "${{ github.repository }}" "$issue" --body "🔄 Label corrected: No associated PR found. Returned to ai:ready." 2>&1
                echo "- ✅ Fixed issue #$issue" >> $GITHUB_STEP_SUMMARY
                FIXED=$((FIXED + 1))
              fi
            fi
          done

          if [ $FIXED -eq 0 ]; then
            echo "- No orphaned labels found" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  summary:
    name: Cleanup Summary
    needs: [cleanup-branches, cleanup-cache, cleanup-issues]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "## 🧹 Resource Cleanup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | ${{ needs.cleanup-branches.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache | ${{ needs.cleanup-cache.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues | ${{ needs.cleanup-issues.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Branches deleted: ${{ needs.cleanup-branches.outputs.deleted_count || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branches skipped: ${{ needs.cleanup-branches.outputs.skipped_count || '0' }}" >> $GITHUB_STEP_SUMMARY
