name: Orchestrator Preflight

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: false
        type: string
        default: ''
      force_run:
        description: 'Force run even if paused'
        required: false
        type: boolean
        default: false
    outputs:
      mode_ok:
        description: 'Automation mode is enabled'
        value: ${{ jobs.preflight.outputs.mode_ok }}
      rate_limit_ok:
        description: 'Rate limit check passed'
        value: ${{ jobs.preflight.outputs.rate_limit_ok }}
      target_repo:
        description: 'Resolved target repository'
        value: ${{ jobs.preflight.outputs.target_repo }}
      max_concurrency:
        description: 'Maximum concurrent tasks'
        value: ${{ jobs.preflight.outputs.max_concurrency }}

env:
  DEFAULT_REPO: 'mizunomi/freee_audit'

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
    outputs:
      mode_ok: ${{ steps.mode.outputs.ok }}
      rate_limit_ok: ${{ steps.rate.outputs.ok }}
      target_repo: ${{ steps.resolve.outputs.repo }}
      max_concurrency: ${{ steps.schedule.outputs.max_concurrency }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: true

      - name: Resolve target repository
        id: resolve
        run: |
          if [ -n "${{ inputs.target_repo }}" ]; then
            REPO="${{ inputs.target_repo }}"
          else
            REPO="${{ env.DEFAULT_REPO }}"
          fi
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "::notice::Target repository: $REPO"

      - name: Check automation mode
        id: mode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ steps.resolve.outputs.repo }}"

          MODE=$(gh api "/repos/$REPO/actions/variables/AI_AUTOMATION_MODE" --jq '.value' 2>/dev/null || echo "PAUSE")

          echo "::notice::AI_AUTOMATION_MODE=$MODE"

          if [ "$MODE" != "RUN" ] && [ "${{ inputs.force_run }}" != "true" ]; then
            echo "::notice::Automation paused (mode: $MODE)"
            echo "ok=false" >> $GITHUB_OUTPUT
          else
            echo "ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Check rate limit
        id: rate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ steps.resolve.outputs.repo }}"

          ONE_HOUR_AGO=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)

          RUNS=$(gh api "/repos/$REPO/actions/runs" \
            --paginate \
            --jq "[.workflow_runs[] | select(.created_at > \"$ONE_HOUR_AGO\" and (.status == \"in_progress\" or .status == \"queued\"))] | length" 2>/dev/null || echo "0")

          MAX_CONCURRENT=2
          echo "::notice::Current runs: $RUNS (max: $MAX_CONCURRENT)"

          if [ "$RUNS" -lt "$MAX_CONCURRENT" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Rate limit reached ($RUNS/$MAX_CONCURRENT runs)"
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Calculate max concurrency
        id: schedule
        run: |
          HOUR_JST=$(( ($(date -u +%H) + 9) % 24 ))
          DOW=$(date -u +%u)

          if [[ $DOW -le 5 && $HOUR_JST -ge 8 && $HOUR_JST -lt 19 ]]; then
            MAX=2
            REASON="Weekday daytime - reserving 1 session for human use"
          else
            MAX=3
            REASON="Off-hours - full automation available"
          fi

          echo "max_concurrency=$MAX" >> $GITHUB_OUTPUT
          echo "::notice::Max concurrency: $MAX ($REASON)"

      - name: Audit log
        if: always()
        uses: ./.github/actions/audit-log
        with:
          event-type: 'preflight_check'
          event-data: |
            {
              "target_repo": "${{ steps.resolve.outputs.repo }}",
              "mode_ok": "${{ steps.mode.outputs.ok }}",
              "rate_limit_ok": "${{ steps.rate.outputs.ok }}",
              "max_concurrency": "${{ steps.schedule.outputs.max_concurrency }}"
            }
          severity: 'info'
