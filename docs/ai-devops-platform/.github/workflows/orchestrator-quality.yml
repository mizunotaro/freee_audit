name: Orchestrator Quality

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
        type: string
      issue_number:
        description: 'Issue number'
        required: true
        type: string
    outputs:
      passed:
        description: 'Whether quality gates passed'
        value: ${{ jobs.quality.outputs.passed }}
      results:
        description: 'Quality gate results'
        value: ${{ jobs.quality.outputs.results }}
      attempt:
        description: 'Current fix attempt number'
        value: ${{ jobs.quality.outputs.attempt }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    outputs:
      passed: ${{ steps.gates.outputs.passed }}
      results: ${{ steps.gates.outputs.results }}
      attempt: ${{ steps.attempts.outputs.current }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ github.token }}

      - name: Setup Node with cache
        uses: ./.github/actions/setup-node
        with:
          node-version: '20'

      - name: Check previous attempts
        id: attempts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.target_repo }}"
          NUMBER="${{ inputs.issue_number }}"

          COMMENTS=$(gh issue view --repo "$REPO" "$NUMBER" --json comments --jq '.comments' 2>/dev/null || echo "[]")
          ATTEMPTS=$(echo "$COMMENTS" | jq '[.[] | select(.body | contains("Auto-fix attempt"))] | length')
          CURRENT=$((ATTEMPTS + 1))

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "::notice::Current attempt: $CURRENT"

      - name: Run quality gates
        id: gates
        uses: ./.github/actions/run-quality-gates
        with:
          config-path: 'config/target-repos.json'
          fail-fast: 'false'
        continue-on-error: true

      - name: Comment results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.target_repo }}"
          NUMBER="${{ inputs.issue_number }}"
          PASSED="${{ steps.gates.outputs.passed }}"

          if [ "$PASSED" == "true" ]; then
            BODY="✅ **Quality Gates Passed** - All quality gates passed successfully. Duration: ${{ steps.gates.outputs.duration-ms }}ms"
          else
            FAILED="${{ steps.gates.outputs.failed-gates }}"
            BODY="❌ **Quality Gates Failed** - Failed gates: $FAILED - Auto-fix will be attempted (attempt ${{ steps.attempts.outputs.current }}/3)"
          fi
          gh issue comment --repo "$REPO" "$NUMBER" --body "$BODY"

      - name: Audit log
        if: always()
        uses: ./.github/actions/audit-log
        with:
          event-type: 'quality_gates'
          event-data: '{"issue_number": "${{ inputs.issue_number }}", "passed": "${{ steps.gates.outputs.passed }}", "duration_ms": "${{ steps.gates.outputs.duration-ms }}", "attempt": "${{ steps.attempts.outputs.current }}"}'
          severity: 'info'
