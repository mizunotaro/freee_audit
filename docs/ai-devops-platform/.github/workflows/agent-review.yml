name: Agent - Review

on:
  workflow_call:
    inputs:
      repository:
        description: 'Target repository'
        required: true
        type: string
      issue_number:
        description: 'Issue number'
        required: true
        type: number
      branch:
        description: 'Branch name'
        required: true
        type: string
      session_id:
        description: 'Session ID for handoff'
        required: true
        type: string
    outputs:
      review_passed:
        description: 'Review passed'
        value: ${{ jobs.review.outputs.passed }}
      score:
        description: 'Overall quality score'
        value: ${{ jobs.review.outputs.score }}
      issues:
        description: 'Issues found (JSON)'
        value: ${{ jobs.review.outputs.issues }}

env:
  ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      passed: ${{ steps.evaluate.outputs.passed }}
      score: ${{ steps.evaluate.outputs.score }}
      issues: ${{ steps.evaluate.outputs.issues }}
    steps:
      - name: Checkout target
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository }}
          token: ${{ secrets.HUB_PAT }}
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          git fetch origin main
          FILES=$(git diff --name-only origin/main...HEAD | head -50)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          DIFF=$(git diff origin/main...HEAD --stat | head -100)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run quality gates first
        id: quality
        continue-on-error: true
        run: |
          echo "### Quality Gates Pre-Check" >> $GITHUB_STEP_SUMMARY

          RESULTS="{}"

          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm && pnpm install --frozen-lockfile
          fi

          echo "::group::TypeScript"
          if pnpm tsc --noEmit 2>&1 | tee tsc.out; then
            echo "✅ tsc: pass" >> $GITHUB_STEP_SUMMARY
            RESULTS=$(echo "$RESULTS" | jq '. + {tsc: "pass"}')
          else
            echo "❌ tsc: fail" >> $GITHUB_STEP_SUMMARY
            RESULTS=$(echo "$RESULTS" | jq '. + {tsc: "fail"}')
          fi
          echo "::endgroup::"

          echo "::group::ESLint"
          if pnpm eslint src/ --max-warnings=0 2>&1 | tee eslint.out; then
            echo "✅ eslint: pass" >> $GITHUB_STEP_SUMMARY
            RESULTS=$(echo "$RESULTS" | jq '. + {eslint: "pass"}')
          else
            echo "❌ eslint: fail" >> $GITHUB_STEP_SUMMARY
            RESULTS=$(echo "$RESULTS" | jq '. + {eslint: "fail"}')
          fi
          echo "::endgroup::"

          echo "results=$RESULTS" >> $GITHUB_OUTPUT

      - name: Run Reviewer Agent
        id: review
        uses: anomalyco/opencode/github@v1.1.44
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        with:
          model: zai-coding-plan/glm-5
          agent: reviewer
          prompt: |
            ## Code Review Task

            Review the changes in this PR against the 10 Quality Criteria.

            ### Changed Files:
            ```
            ${{ steps.changes.outputs.files }}
            ```

            ### Diff Stats:
            ```
            ${{ steps.changes.outputs.diff }}
            ```

            ### Quality Criteria to Evaluate:

            1. **Stability** (weight: 1.0)
               - External API calls have timeout settings
               - Retry logic implemented (max 3 retries)
               - Graceful degradation implemented
               - Error handling complete
               - Resource cleanup implemented
               - Connection timeout configured

            2. **Robustness** (weight: 1.0)
               - Input validation implemented
               - Exception handling comprehensive
               - Boundary value tests created
               - Null safety ensured
               - Type safety (TypeScript strict mode)
               - Edge cases handled

            3. **Reproducibility** (weight: 0.8)
               - Configuration versioned
               - Deterministic processing
               - Random seed fixed if needed
               - Environment separation
               - Dependency versions pinned
               - State management explicit

            4. **Extensibility** (weight: 0.7)
               - Plugin pattern adopted
               - Interface segregation
               - Dependency injection
               - Open-closed principle followed
               - Configuration externalized
               - Modular design

            5. **Maintainability** (weight: 0.8)
               - Single responsibility principle
               - Documentation created
               - Naming conventions unified
               - Code structure organized
               - Appropriate comments
               - Complexity managed

            6. **Security** (weight: 1.2) - CRITICAL
               - Input sanitization
               - Sensitive data protection
               - Authentication/authorization verified
               - Encryption used where needed
               - Audit logging
               - Security headers
               - Safe default values

            7. **Performance** (weight: 0.7)
               - Caching strategy
               - Parallel processing utilized
               - Memory management
               - Lazy loading
               - Query optimization
               - Resource pooling

            8. **Syntax Error Prevention** (weight: 1.0) - CRITICAL
               - Strict mode enabled
               - Type definitions complete
               - Null checks
               - Exhaustive switch statements
               - Error boundaries
               - Lint rules followed

            9. **Function Design** (weight: 0.9)
               - Object argument pattern
               - Result type used
               - Side effects separated
               - Pure functions utilized
               - Immutability ensured
               - Explicit return values

            10. **Overall Consistency** (weight: 0.8)
                - Consistency with existing code
                - Patterns unified
                - Architecture followed
                - Style guide adhered
                - API consistency
                - Error format unified

            ### Required Output Format:

            Output your review in the following JSON format:
            ```json
            {
              "overall_score": <0-100>,
              "passed": <true|false>,
              "criteria": {
                "stability": {"score": <0-100>, "issues": ["issue1", ...]},
                "robustness": {"score": <0-100>, "issues": ["issue1", ...]},
                "reproducibility": {"score": <0-100>, "issues": ["issue1", ...]},
                "extensibility": {"score": <0-100>, "issues": ["issue1", ...]},
                "maintainability": {"score": <0-100>, "issues": ["issue1", ...]},
                "security": {"score": <0-100>, "issues": ["issue1", ...]},
                "performance": {"score": <0-100>, "issues": ["issue1", ...]},
                "syntax": {"score": <0-100>, "issues": ["issue1", ...]},
                "functionDesign": {"score": <0-100>, "issues": ["issue1", ...]},
                "consistency": {"score": <0-100>, "issues": ["issue1", ...]}
              },
              "critical_issues": ["critical issue 1", ...],
              "recommendations": ["recommendation 1", ...],
              "summary": "Brief summary of the review"
            }
            ```

            **Important:**
            - Passing threshold: 80 overall score
            - Critical criteria (security, stability, robustness, syntax) must score >= 70
            - Be objective and neutral in your assessment
            - Provide specific, actionable feedback
          token: ${{ secrets.HUB_PAT }}

      - name: Parse review results
        id: evaluate
        run: |
          REVIEW_OUTPUT="${{ steps.review.outputs.response }}"

          PASSED=$(echo "$REVIEW_OUTPUT" | jq -r '.passed // false')
          SCORE=$(echo "$REVIEW_OUTPUT" | jq -r '.overall_score // 0')
          ISSUES=$(echo "$REVIEW_OUTPUT" | jq -c '.criteria // {}')
          CRITICAL=$(echo "$REVIEW_OUTPUT" | jq -c '.critical_issues // []')
          SUMMARY=$(echo "$REVIEW_OUTPUT" | jq -r '.summary // ""')

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT

          echo "### Review Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Overall Score:** $SCORE / 100" >> $GITHUB_STEP_SUMMARY
          echo "- **Passed:** $PASSED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Summary" >> $GITHUB_STEP_SUMMARY
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.HUB_PAT }}
        run: |
          REVIEW_OUTPUT="${{ steps.review.outputs.response }}"

          cat > review_comment.md << 'COMMENT_EOF'
          ## 🔍 Code Review Results

          **Session ID:** ${{ inputs.session_id }}
          **Overall Score:** ${{ steps.evaluate.outputs.score }} / 100
          **Status:** ${{ steps.evaluate.outputs.passed == 'true' && '✅ PASSED' || '❌ NEEDS IMPROVEMENT' }}

          COMMENT_EOF

          echo "$REVIEW_OUTPUT" | jq -r '.summary // ""' >> review_comment.md
          echo "" >> review_comment.md
          echo "### Criteria Scores" >> review_comment.md
          echo "" >> review_comment.md
          echo "| Criteria | Score | Issues |" >> review_comment.md
          echo "|----------|-------|--------|" >> review_comment.md

          echo "$REVIEW_OUTPUT" | jq -r '.criteria | to_entries[] | "| \(.key) | \(.value.score) | \(.value.issues | length) |"' >> review_comment.md

          if [ "$(echo "$REVIEW_OUTPUT" | jq '.critical_issues | length')" -gt 0 ]; then
            echo "" >> review_comment.md
            echo "### ⚠️ Critical Issues" >> review_comment.md
            echo "$REVIEW_OUTPUT" | jq -r '.critical_issues[] | "- \(. )"' >> review_comment.md
          fi

          if [ "$(echo "$REVIEW_OUTPUT" | jq '.recommendations | length')" -gt 0 ]; then
            echo "" >> review_comment.md
            echo "### 💡 Recommendations" >> review_comment.md
            echo "$REVIEW_OUTPUT" | jq -r '.recommendations[] | "- \(. )"' >> review_comment.md
          fi

          gh issue comment ${{ inputs.issue_number }} --repo ${{ inputs.repository }} --body-file review_comment.md
