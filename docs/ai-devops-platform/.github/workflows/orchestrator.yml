name: AI Orchestrator

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: false
        default: 'mizunomi/freee_audit'
      force_run:
        description: 'Force run even if paused'
        required: false
        default: false
        type: boolean

env:
  DEFAULT_REPO: 'mizunomi/freee_audit'

jobs:
  preflight:
    uses: ./.github/workflows/orchestrator-preflight.yml
    with:
      target_repo: ${{ inputs.target_repo || 'mizunomi/freee_audit' }}
      force_run: ${{ inputs.force_run || false }}

  select:
    needs: preflight
    if: needs.preflight.outputs.mode_ok == 'true' && needs.preflight.outputs.rate_limit_ok == 'true'
    uses: ./.github/workflows/orchestrator-select.yml
    with:
      target_repo: ${{ needs.preflight.outputs.target_repo }}

  execute:
    needs: [preflight, select]
    if: needs.select.outputs.has_task == 'true'
    uses: ./.github/workflows/orchestrator-execute.yml
    with:
      target_repo: ${{ needs.preflight.outputs.target_repo }}
      issue_number: ${{ needs.select.outputs.issue_number }}
      issue_title: ${{ needs.select.outputs.issue_title }}
      issue_body: ${{ needs.select.outputs.issue_body }}

  quality:
    needs: [preflight, select, execute]
    if: always() && needs.select.outputs.has_task == 'true'
    uses: ./.github/workflows/orchestrator-quality.yml
    with:
      target_repo: ${{ needs.preflight.outputs.target_repo }}
      issue_number: ${{ needs.select.outputs.issue_number }}

  merge:
    needs: [preflight, select, quality]
    if: needs.quality.outputs.passed == 'true'
    uses: ./.github/workflows/orchestrator-merge.yml
    with:
      target_repo: ${{ needs.preflight.outputs.target_repo }}
      issue_number: ${{ needs.select.outputs.issue_number }}

  fix:
    needs: [preflight, select, quality]
    if: needs.quality.outputs.passed == 'false' && needs.quality.outputs.attempt <= 3
    uses: ./.github/workflows/orchestrator-fix.yml
    with:
      target_repo: ${{ needs.preflight.outputs.target_repo }}
      issue_number: ${{ needs.select.outputs.issue_number }}
      attempt: ${{ needs.quality.outputs.attempt }}

  idle:
    needs: [preflight, select]
    if: needs.preflight.outputs.mode_ok == 'true' && needs.select.outputs.has_task == 'false'
    uses: ./.github/workflows/orchestrator-idle.yml
    with:
      target_repo: ${{ needs.preflight.outputs.target_repo }}

  summary:
    needs: [preflight, select, execute, quality, merge, fix, idle]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "## AI Orchestrator Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Preflight | ${{ needs.preflight.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Select | ${{ needs.select.result == 'success' && '✅' || needs.select.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Execute | ${{ needs.execute.result == 'success' && '✅' || needs.execute.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ needs.quality.result == 'success' && '✅' || needs.quality.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Merge | ${{ needs.merge.result == 'success' && '✅' || needs.merge.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fix | ${{ needs.fix.result == 'success' && '✅' || needs.fix.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Idle | ${{ needs.idle.result == 'success' && '✅' || needs.idle.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ needs.preflight.outputs.target_repo }}" >> $GITHUB_STEP_SUMMARY
          echo "**Max Concurrency:** ${{ needs.preflight.outputs.max_concurrency }}" >> $GITHUB_STEP_SUMMARY
