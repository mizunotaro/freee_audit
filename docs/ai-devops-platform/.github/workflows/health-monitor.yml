name: Health Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@628eae0335e8e7a1ee4935f2a3c9ab5e9c41fe6c
        with:
          sparse-checkout: true

      - name: Detect Stale Sessions
        id: stale
        run: |
          set -euo pipefail

          THIRTY_MIN_AGO=$(date -u -d '30 minutes ago' +%Y-%m-%dT%H:%M:%SZ)

          STALE_ISSUES=$(gh issue list --repo "${{ github.repository }}" \
            --label "ai:in-progress" \
            --state open \
            --json number,updatedAt \
            --jq ".[] | select(.updatedAt < \"$THIRTY_MIN_AGO\") | .number")

          if [ -n "$STALE_ISSUES" ]; then
            echo "stale_issues=$STALE_ISSUES" >> $GITHUB_OUTPUT
            for ISSUE in $STALE_ISSUES; do
              gh issue comment --repo "${{ github.repository }}" "$ISSUE" \
                --body "⏰ **Session Timeout Detected** - No activity for 30 minutes. Returning to ai:ready."
              gh issue edit --repo "${{ github.repository }}" "$ISSUE" \
                --remove-label "ai:in-progress" \
                --add-label "ai:ready"
            done
          else
            echo "stale_issues=" >> $GITHUB_OUTPUT
          fi

      - name: Detect Hanging Workflows
        id: hanging
        run: |
          set -euo pipefail

          ONE_HOUR_AGO=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)

          HANGING_RUNS=$(gh run list --repo "${{ github.repository }}" \
            --status in_progress \
            --json databaseId,createdAt,displayTitle \
            --jq ".[] | select(.createdAt < \"$ONE_HOUR_AGO\") | .databaseId")

          if [ -n "$HANGING_RUNS" ]; then
            echo "hanging_runs=$HANGING_RUNS" >> $GITHUB_OUTPUT
            for RUN_ID in $HANGING_RUNS; do
              echo "::warning::Cancelling hanging workflow: $RUN_ID"
              gh run cancel --repo "${{ github.repository }}" "$RUN_ID" || true
            done
          else
            echo "hanging_runs=" >> $GITHUB_OUTPUT
          fi

      - name: Detect Orphaned Labels
        id: orphaned
        run: |
          set -euo pipefail

          PR_OPEN_ISSUES=$(gh issue list --repo "${{ github.repository }}" \
            --label "ai:pr-open" \
            --state open \
            --json number \
            --jq '.[].number')

          ORPHANED=""

          for ISSUE in $PR_OPEN_ISSUES; do
            PR=$(gh pr list --repo "${{ github.repository }}" \
              --state all \
              --search "#$ISSUE" \
              --json number \
              --jq '.[0].number // empty')
            
            if [ -z "$PR" ]; then
              ORPHANED="$ORPHANED $ISSUE"
              gh issue comment --repo "${{ github.repository }}" "$ISSUE" \
                --body "🔄 **Label Corrected** - No associated PR found. Returning to ai:ready."
              gh issue edit --repo "${{ github.repository }}" "$ISSUE" \
                --remove-label "ai:pr-open" \
                --add-label "ai:ready"
            fi
          done

          echo "orphaned=$(echo "$ORPHANED" | xargs)" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## Health Monitor Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Stale Issues: ${{ steps.stale.outputs.stale_issues || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Hanging Runs: ${{ steps.hanging.outputs.hanging_runs || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Orphaned Labels: ${{ steps.orphaned.outputs.orphaned || 'None' }}" >> $GITHUB_STEP_SUMMARY
