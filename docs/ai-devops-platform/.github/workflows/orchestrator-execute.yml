name: Orchestrator Execute

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
        type: string
      issue_number:
        description: 'Issue number'
        required: true
        type: string
      issue_title:
        description: 'Issue title'
        required: true
        type: string
      issue_body:
        description: 'Issue body (base64)'
        required: true
        type: string
    outputs:
      outcome:
        description: 'Execution outcome'
        value: ${{ jobs.execute.outputs.outcome }}
      branch_name:
        description: 'Created branch name'
        value: ${{ jobs.execute.outputs.branch_name }}

env:
  AI_MODEL: 'zai-coding-plan/glm-5'

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    outputs:
      outcome: ${{ steps.execute.outputs.outcome }}
      branch_name: ${{ steps.branch.outputs.name }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Setup Node with cache
        uses: ./.github/actions/setup-node
        with:
          node-version: '20'

      - name: Create branch
        id: branch
        run: |
          TITLE="${{ inputs.issue_title }}"
          NUMBER="${{ inputs.issue_number }}"

          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40)
          BRANCH="ai-task-${NUMBER}-${SLUG}"

          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"

          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          echo "::notice::Created branch: $BRANCH"

      - name: Decode issue body
        id: body
        run: |
          BODY=$(echo "${{ inputs.issue_body }}" | base64 -d)
          echo "decoded<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run OpenCode
        id: execute
        timeout-minutes: 20
        uses: anomalyco/opencode/github@v1.1.44
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          OPENCODE_DISABLE_AUTOUPDATE: 'true'
        with:
          model: ${{ env.AI_MODEL }}
          prompt: |
            # AI Development Task

            ## Issue Details
            - Number: #${{ inputs.issue_number }}
            - Title: ${{ inputs.issue_title }}

            ## Issue Body
            ${{ steps.body.outputs.decoded }}

            ## Quality Requirements

            Before completion, ensure all quality gates pass:
            1. `pnpm tsc --noEmit` - TypeScript type check
            2. `pnpm eslint src/ --max-warnings=0` - Lint check
            3. `pnpm jest --passWithNoTests --coverage` - Tests
            4. `pnpm build` - Build

            ## Completion Criteria
            - All quality gates pass
            - Create PR closing #${{ inputs.issue_number }}
          token: ${{ github.token }}
        continue-on-error: true

      - name: Record result
        if: always()
        id: record
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTCOME="${{ steps.execute.outcome }}"
          echo "outcome=$OUTCOME" >> $GITHUB_OUTPUT

          REPO="${{ inputs.target_repo }}"
          NUMBER="${{ inputs.issue_number }}"

          if [ "$OUTCOME" == "success" ]; then
            BODY="✅ **Execution Completed** - Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) - Branch: \`${{ steps.branch.outputs.name }}\`"
          else
            BODY="⚠️ **Execution Failed** - Outcome: $OUTCOME - Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi
          gh issue comment --repo "$REPO" "$NUMBER" --body "$BODY"

      - name: Audit log
        if: always()
        uses: ./.github/actions/audit-log
        with:
          event-type: 'task_executed'
          event-data: '{"issue_number": "${{ inputs.issue_number }}", "outcome": "${{ steps.execute.outcome }}", "branch": "${{ steps.branch.outputs.name }}", "model": "${{ env.AI_MODEL }}"}'
          severity: 'info'
