name: 'Run Quality Gates'
description: 'Execute quality gates from configuration with detailed reporting'
author: 'AI DevOps Platform'

inputs:
  config-path:
    description: 'Path to target-repos.json'
    required: false
    default: 'config/target-repos.json'
  repository-index:
    description: 'Repository index in config (0-based)'
    required: false
    default: '0'
  fail-fast:
    description: 'Stop on first failure'
    required: false
    default: 'false'
  skip-gates:
    description: 'Comma-separated list of gates to skip'
    required: false
    default: ''

outputs:
  passed:
    description: 'Whether all quality gates passed'
    value: ${{ steps.gates.outputs.passed }}
  results:
    description: 'JSON array of gate results'
    value: ${{ steps.gates.outputs.results }}
  summary:
    description: 'Human-readable summary'
    value: ${{ steps.gates.outputs.summary }}
  failed-gates:
    description: 'Comma-separated list of failed gates'
    value: ${{ steps.gates.outputs.failed_gates }}
  duration-ms:
    description: 'Total duration in milliseconds'
    value: ${{ steps.gates.outputs.duration_ms }}

runs:
  using: 'composite'
  steps:
    - name: Load configuration
      id: config
      shell: bash
      run: |
        CONFIG="${{ inputs.config-path }}"
        INDEX="${{ inputs.repository-index }}"

        if [ ! -f "$CONFIG" ]; then
          echo "::error::Configuration file not found: $CONFIG"
          exit 1
        fi

        GATES=$(jq -c ".repositories[$INDEX].qualityGates | to_entries | sort_by(.value.order // .key)" "$CONFIG")

        if [ -z "$GATES" ] || [ "$GATES" == "null" ]; then
          echo "::error::No quality gates found in configuration"
          exit 1
        fi

        echo "gates=$GATES" >> $GITHUB_OUTPUT
        echo "gate_count=$(echo "$GATES" | jq 'length')" >> $GITHUB_OUTPUT

    - name: Execute quality gates
      id: gates
      shell: bash
      run: |
        GATES='${{ steps.config.outputs.gates }}'
        FAIL_FAST="${{ inputs.fail-fast }}"
        SKIP="${{ inputs.skip-gates }}"
        TOTAL_START=$(date +%s%3N)

        RESULTS="[]"
        ALL_PASSED=true
        FAILED_GATES=""
        SUMMARY=""

        echo "## Quality Gates" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Gate | Status | Duration |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|----------|" >> $GITHUB_STEP_SUMMARY

        for gate in $(echo "$GATES" | jq -c '.[]'); do
          NAME=$(echo "$gate" | jq -r '.key')
          CMD=$(echo "$gate" | jq -r '.value.command')
          TIMEOUT=$(echo "$gate" | jq -r '.value.timeout // 120000')
          REQUIRED=$(echo "$gate" | jq -r '.value.required // true')
          DESC=$(echo "$gate" | jq -r '.value.description // ""')
          
          if echo "$SKIP" | grep -qw "$NAME"; then
            echo "| $NAME | ⏭️ Skipped | - |" >> $GITHUB_STEP_SUMMARY
            RESULTS=$(echo "$RESULTS" | jq --arg n "$NAME" '. + [{name: $n, status: "skipped", duration_ms: 0}]')
            continue
          fi
          
          echo "::group::$NAME: $CMD"
          echo "Description: $DESC"
          echo "Timeout: ${TIMEOUT}ms"
          echo "Required: $REQUIRED"
          
          START=$(date +%s%3N)
          TIMEOUT_SEC=$((TIMEOUT / 1000))
          
          set +e
          OUTPUT_FILE=$(mktemp)
          timeout $TIMEOUT_SEC bash -c "$CMD" > "$OUTPUT_FILE" 2>&1
          EXIT_CODE=$?
          set -e
          
          END=$(date +%s%3N)
          DURATION=$((END - START))
          
          if [ $EXIT_CODE -eq 0 ]; then
            STATUS="pass"
            EMOJI="✅"
            echo "| $NAME | $EMOJI Pass | ${DURATION}ms |" >> $GITHUB_STEP_SUMMARY
          elif [ $EXIT_CODE -eq 124 ]; then
            STATUS="timeout"
            EMOJI="⏱️"
            if [ "$REQUIRED" == "true" ]; then
              ALL_PASSED=false
              FAILED_GATES="$FAILED_GATES,$NAME"
            fi
            echo "| $NAME | $EMOJI Timeout | ${DURATION}ms |" >> $GITHUB_STEP_SUMMARY
            echo "::error::$NAME timed out after ${TIMEOUT_SEC}s"
          else
            STATUS="fail"
            EMOJI="❌"
            if [ "$REQUIRED" == "true" ]; then
              ALL_PASSED=false
              FAILED_GATES="$FAILED_GATES,$NAME"
            fi
            echo "| $NAME | $EMOJI Fail | ${DURATION}ms |" >> $GITHUB_STEP_SUMMARY
            echo "::error::$NAME failed with exit code $EXIT_CODE"
            
            echo "Output (last 50 lines):"
            tail -50 "$OUTPUT_FILE" || true
          fi
          
          rm -f "$OUTPUT_FILE"
          echo "::endgroup::"
          
          RESULTS=$(echo "$RESULTS" | jq \
            --arg n "$NAME" \
            --arg s "$STATUS" \
            --argjson d "$DURATION" \
            --arg r "$REQUIRED" \
            '. + [{name: $n, status: $s, duration_ms: $d, required: $r}]')
          
          if [ "$FAIL_FAST" == "true" ] && [ "$STATUS" != "pass" ] && [ "$REQUIRED" == "true" ]; then
            echo "::warning::Stopping early due to fail-fast mode"
            break
          fi
        done

        TOTAL_END=$(date +%s%3N)
        TOTAL_DURATION=$((TOTAL_END - TOTAL_START))

        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "$ALL_PASSED" == "true" ]; then
          echo "**Result:** ✅ All quality gates passed (${TOTAL_DURATION}ms)" >> $GITHUB_STEP_SUMMARY
          SUMMARY="All quality gates passed"
        else
          FAILED_COUNT=$(echo "$FAILED_GATES" | tr ',' '\n' | grep -v '^$' | wc -l)
          echo "**Result:** ❌ $FAILED_COUNT gate(s) failed (${TOTAL_DURATION}ms)" >> $GITHUB_STEP_SUMMARY
          SUMMARY="$FAILED_COUNT quality gate(s) failed"
        fi

        echo "passed=$ALL_PASSED" >> $GITHUB_OUTPUT
        echo "results=$(echo "$RESULTS" | jq -c '.')" >> $GITHUB_OUTPUT
        echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
        echo "failed_gates=$(echo "$FAILED_GATES" | sed 's/^,//')" >> $GITHUB_OUTPUT
        echo "duration_ms=$TOTAL_DURATION" >> $GITHUB_OUTPUT

        if [ "$ALL_PASSED" != "true" ]; then
          exit 1
        fi

branding:
  icon: 'check-circle'
  color: 'green'
