name: 'Audit Log'
description: 'Create structured audit log entries for compliance and debugging'
author: 'AI DevOps Platform'

inputs:
  event-type:
    description: 'Type of audit event'
    required: true
  event-data:
    description: 'Event data (JSON object)'
    required: true
  severity:
    description: 'Severity level (info, warning, error, critical)'
    required: false
    default: 'info'
  log-to-file:
    description: 'Write to audit.log file'
    required: false
    default: 'false'
  alert-on-error:
    description: 'Create GitHub annotation on error'
    required: false
    default: 'true'

outputs:
  entry-id:
    description: 'Unique ID of the audit entry'
    value: ${{ steps.audit.outputs.id }}
  timestamp:
    description: 'ISO timestamp of the entry'
    value: ${{ steps.audit.outputs.timestamp }}

runs:
  using: 'composite'
  steps:
    - name: Create audit entry
      id: audit
      shell: bash
      run: |
        EVENT_TYPE="${{ inputs.event-type }}"
        EVENT_DATA='${{ inputs.event-data }}'
        SEVERITY="${{ inputs.severity }}"
        LOG_TO_FILE="${{ inputs.log-to-file }}"
        ALERT_ON_ERROR="${{ inputs.alert-on-error }}"

        TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        ENTRY_ID="audit-$(date +%s%N | md5sum | cut -c1-8)"

        ENTRY=$(jq -n \
          --arg id "$ENTRY_ID" \
          --arg ts "$TIMESTAMP" \
          --arg type "$EVENT_TYPE" \
          --arg severity "$SEVERITY" \
          --arg actor "${{ github.actor }}" \
          --arg repo "${{ github.repository }}" \
          --arg run_id "${{ github.run_id }}" \
          --arg workflow "${{ github.workflow }}" \
          --argjson data "$EVENT_DATA" \
          '{
            id: $id,
            timestamp: $ts,
            type: $type,
            severity: $severity,
            actor: $actor,
            repository: $repo,
            run_id: $run_id,
            workflow: $workflow,
            data: $data
          }')

        echo "id=$ENTRY_ID" >> $GITHUB_OUTPUT
        echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

        echo "### Audit Log Entry" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| ID | \`$ENTRY_ID\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Timestamp | $TIMESTAMP |" >> $GITHUB_STEP_SUMMARY
        echo "| Type | $EVENT_TYPE |" >> $GITHUB_STEP_SUMMARY
        echo "| Severity | $SEVERITY |" >> $GITHUB_STEP_SUMMARY
        echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

        if [ "$LOG_TO_FILE" == "true" ]; then
          echo "$ENTRY" >> audit.log
          echo "| Log File | audit.log |" >> $GITHUB_STEP_SUMMARY
        fi

        case "$SEVERITY" in
          critical)
            echo "::error::[$EVENT_TYPE] $(echo "$EVENT_DATA" | jq -r '.message // .')"
            ;;
          error)
            if [ "$ALERT_ON_ERROR" == "true" ]; then
              echo "::error::[$EVENT_TYPE] $(echo "$EVENT_DATA" | jq -r '.message // .')"
            fi
            ;;
          warning)
            echo "::warning::[$EVENT_TYPE] $(echo "$EVENT_DATA" | jq -r '.message // .')"
            ;;
          info)
            echo "::notice::[$EVENT_TYPE] Audit entry created"
            ;;
        esac

        echo "entry<<EOF" >> $GITHUB_OUTPUT
        echo "$ENTRY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

branding:
  icon: 'file-text'
  color: 'purple'
