name: 'Command with Retry'
description: 'Execute command with exponential backoff retry'
author: 'AI DevOps Platform'

inputs:
  command:
    description: 'Command to execute'
    required: true
  max_attempts:
    description: 'Maximum number of attempts'
    required: false
    default: '3'
  backoff_ms:
    description: 'Comma-separated backoff delays in milliseconds'
    required: false
    default: '1000,2000,4000'
  retry_on_error:
    description: 'Retry on any non-zero exit code'
    required: false
    default: 'true'
  timeout_seconds:
    description: 'Timeout per attempt in seconds'
    required: false
    default: '300'

outputs:
  success:
    description: 'Whether the command succeeded'
    value: ${{ steps.retry.outputs.success }}
  attempts:
    description: 'Number of attempts made'
    value: ${{ steps.retry.outputs.attempts }}
  exit_code:
    description: 'Exit code of the command'
    value: ${{ steps.retry.outputs.exit_code }}
  output:
    description: 'Command output (last 1000 chars)'
    value: ${{ steps.retry.outputs.output }}

runs:
  using: 'composite'
  steps:
    - name: Execute with retry
      id: retry
      shell: bash
      run: |
        set +e

        COMMAND='${{ inputs.command }}'
        MAX_ATTEMPTS=${{ inputs.max_attempts }}
        BACKOFF='${{ inputs.backoff_ms }}'
        RETRY_ON_ERROR='${{ inputs.retry_on_error }}'
        TIMEOUT=${{ inputs.timeout_seconds }}

        IFS=',' read -ra BACKOFF_ARRAY <<< "$BACKOFF"

        ATTEMPT=0
        EXIT_CODE=0
        OUTPUT=""

        while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
          ATTEMPT=$((ATTEMPT + 1))
          echo "::notice::Attempt $ATTEMPT/$MAX_ATTEMPTS"
          
          TEMP_FILE=$(mktemp)
          
          if [ "$TIMEOUT" -gt 0 ]; then
            timeout $TIMEOUT bash -c "$COMMAND" > "$TEMP_FILE" 2>&1
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 124 ]; then
              echo "::warning::Attempt $ATTEMPT timed out after ${TIMEOUT}s"
            fi
          else
            bash -c "$COMMAND" > "$TEMP_FILE" 2>&1
            EXIT_CODE=$?
          fi
          
          OUTPUT=$(cat "$TEMP_FILE" | tail -c 1000)
          rm -f "$TEMP_FILE"
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "::notice::Command succeeded on attempt $ATTEMPT"
            echo "success=true" >> $GITHUB_OUTPUT
            echo "attempts=$ATTEMPT" >> $GITHUB_OUTPUT
            echo "exit_code=0" >> $GITHUB_OUTPUT
            OUTPUT_SAFE=$(echo "$OUTPUT" | tr '\n' ' ' | cut -c1-1000)
            echo "output=$OUTPUT_SAFE" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ "$RETRY_ON_ERROR" != "true" ]; then
            echo "::error::Command failed (exit: $EXIT_CODE), retry disabled"
            echo "success=false" >> $GITHUB_OUTPUT
            echo "attempts=$ATTEMPT" >> $GITHUB_OUTPUT
            echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
            exit $EXIT_CODE
          fi
          
          if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
            SLEEP_MS=${BACKOFF_ARRAY[$((ATTEMPT-1))]:-1000}
            SLEEP_SEC=$((SLEEP_MS / 1000))
            echo "::warning::Attempt $ATTEMPT failed (exit: $EXIT_CODE), retrying in ${SLEEP_SEC}s..."
            sleep $SLEEP_SEC
          fi
        done

        echo "::error::Command failed after $MAX_ATTEMPTS attempts (exit: $EXIT_CODE)"
        echo "success=false" >> $GITHUB_OUTPUT
        echo "attempts=$ATTEMPT" >> $GITHUB_OUTPUT
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        OUTPUT_SAFE=$(echo "$OUTPUT" | tr '\n' ' ' | cut -c1-1000)
        echo "output=$OUTPUT_SAFE" >> $GITHUB_OUTPUT
        exit $EXIT_CODE

branding:
  icon: 'refresh-cw'
  color: 'blue'
