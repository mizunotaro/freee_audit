# AI Project Configuration Template
# Copy this file to your project's .github/ directory as ai-project.yml

# Project identification
project:
  name: your-project-name
  description: Brief description of your project
  language: TypeScript
  framework: Next.js

# Repository settings
repository:
  owner: your-github-username
  name: your-repo-name
  defaultBranch: main

# AI automation settings
automation:
  enabled: true

  # Branch naming convention for AI-generated code
  branchPrefix: 'ai-task'
  branchPattern: 'ai-task-{issue-number}-{title-slug}'

  # Commit message format
  commitMessageTemplate: |
    {type}({scope}): {description}

    Closes #{issue-number}

    Generated by AI DevOps Platform

# Labels used for AI task management
labels:
  task: ai-task
  inProgress: ai-in-progress
  completed: ai-completed
  blocked: ai-blocked
  autoMerge: auto-merge
  doNotMerge: do-not-merge

  # Priority labels
  priorityCritical: priority-critical
  priorityHigh: priority-high
  priorityMedium: priority-medium
  priorityLow: priority-low

# Quality gates configuration
qualityGates:
  typecheck:
    enabled: true
    command: pnpm tsc --noEmit
    timeout: 120000
    required: true
    autoFixable: false

  lint:
    enabled: true
    command: pnpm eslint src/ --max-warnings=0
    timeout: 120000
    required: true
    autoFixable: true
    fixCommand: pnpm eslint src/ --fix

  test:
    enabled: true
    command: pnpm jest --passWithNoTests
    timeout: 300000
    required: true
    autoFixable: false
    coverageThreshold: 80

  build:
    enabled: true
    command: pnpm build
    timeout: 300000
    required: true
    autoFixable: false

# Auto-merge settings
autoMerge:
  enabled: true

  # Required conditions for auto-merge
  conditions:
    - qualityGatesPassed: true
    - hasLabel: auto-merge
    - noConflicts: true
    - notDraft: true
    - approvalsRequired: 0

  # Blocking conditions
  blockers:
    - hasLabel: do-not-merge
    - hasLabel: needs-review
    - hasLabel: breaking-change
    - filesMatch: '**/migrations/**'
    - filesMatch: '**/*.sql'
    - sizeThreshold: 500

# Code constraints
constraints:
  # Maximum file size (KB)
  maxFileSizeKB: 500

  # Maximum number of files per task
  maxFilesPerTask: 50

  # Paths that require special attention or are forbidden
  forbiddenPaths:
    - '**/migrations/**'
    - '**/*.sql'
    - '**/.env*'
    - '**/prisma/schema.prisma'
    - '**/secrets/**'

  # Paths that require manual review
  reviewRequiredPaths:
    - '**/api/**'
    - '**/auth/**'
    - '**/middleware/**'

# Project-specific patterns and conventions
conventions:
  # File naming
  componentPattern: '{name}.tsx'
  testPattern: '{name}.test.ts'
  utilPattern: '{name}.ts'

  # Import organization
  importOrder:
    - 'react'
    - 'next'
    - 'external'
    - 'internal'
    - 'relative'

  # Code style
  useNamedExports: true
  preferArrowFunctions: true
  requireReturnType: true

# Documentation settings
documentation:
  # Automatically update documentation
  updateReadme: false
  updateChangelog: false
  requireJSDoc: true

# Testing settings
testing:
  framework: jest
  coverageReportPath: coverage/lcov.info
  snapshotTesting: true

# Notification settings (optional)
notifications:
  slack:
    enabled: false
    webhookUrl: null
    channel: null

  email:
    enabled: false
    recipients: []

# Project-specific context for AI
# This helps AI understand the project better
context:
  # Key directories
  sourceDir: src
  testDir: tests
  docsDir: docs

  # Important files to consider
  importantFiles:
    - package.json
    - tsconfig.json
    - README.md
    - AGENTS.md

  # Project-specific instructions
  customInstructions: |
    Add any project-specific instructions here that will help AI
    understand your codebase better and generate more appropriate code.
