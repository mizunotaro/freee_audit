version: '3.8'

services:
  ndlocr-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8002:8000'
    volumes:
      - ./temp:/tmp
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
