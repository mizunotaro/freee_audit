# freee_audit AI Project Configuration
# This file configures AI automation for the freee_audit project

project:
  name: freee_audit
  description: Financial audit system with AI-powered analysis
  language: TypeScript
  framework: Next.js

repository:
  owner: mizunomi
  name: freee_audit
  defaultBranch: main

automation:
  enabled: true
  branchPrefix: 'ai-task'
  branchPattern: 'ai-task-{issue-number}-{title-slug}'
  commitMessageTemplate: |
    {type}({scope}): {description}

    Closes #{issue-number}

    Generated by AI DevOps Platform

labels:
  task: ai-task
  inProgress: ai-in-progress
  completed: ai-completed
  blocked: ai-blocked
  autoMerge: auto-merge
  doNotMerge: do-not-merge
  priorityCritical: priority-critical
  priorityHigh: priority-high
  priorityMedium: priority-medium
  priorityLow: priority-low

qualityGates:
  typecheck:
    enabled: true
    command: pnpm tsc --noEmit
    timeout: 120000
    required: true
    autoFixable: false

  lint:
    enabled: true
    command: pnpm eslint src/ --max-warnings=0
    timeout: 120000
    required: true
    autoFixable: true
    fixCommand: pnpm eslint src/ --fix

  test:
    enabled: true
    command: pnpm jest --passWithNoTests
    timeout: 300000
    required: true
    autoFixable: false
    coverageThreshold: 80

  build:
    enabled: true
    command: pnpm build
    timeout: 300000
    required: true
    autoFixable: false

autoMerge:
  enabled: true
  conditions:
    - qualityGatesPassed: true
    - hasLabel: auto-merge
    - noConflicts: true
    - notDraft: true
    - approvalsRequired: 0
  blockers:
    - hasLabel: do-not-merge
    - hasLabel: needs-review
    - hasLabel: breaking-change
    - filesMatch: '**/migrations/**'
    - filesMatch: '**/*.sql'
    - sizeThreshold: 500

constraints:
  maxFileSizeKB: 500
  maxFilesPerTask: 50
  forbiddenPaths:
    - '**/migrations/**'
    - '**/*.sql'
    - '**/.env*'
    - '**/prisma/schema.prisma'
    - '**/secrets/**'
  reviewRequiredPaths:
    - '**/api/**'
    - '**/auth/**'
    - '**/services/**'
    - '**/lib/ai/**'

conventions:
  componentPattern: '{name}.tsx'
  testPattern: '{name}.test.ts'
  utilPattern: '{name}.ts'
  importOrder:
    - 'react'
    - 'next'
    - 'external'
    - 'internal'
    - 'relative'
  useNamedExports: true
  preferArrowFunctions: true
  requireReturnType: true

documentation:
  updateReadme: false
  updateChangelog: false
  requireJSDoc: true

testing:
  framework: jest
  coverageReportPath: coverage/lcov.info
  snapshotTesting: true

notifications:
  slack:
    enabled: false
  email:
    enabled: false

context:
  sourceDir: src
  testDir: tests
  docsDir: docs
  importantFiles:
    - package.json
    - tsconfig.json
    - README.md
    - AGENTS.md
    - docs/ai/README.md
    - docs/ai/QUALITY_STANDARDS.md
    - docs/ai/CONSTRAINTS.md
  customInstructions: |
    This is a financial audit system with AI-powered analysis capabilities.

    Key points:
    - Follow the quality standards in docs/ai/QUALITY_STANDARDS.md
    - Use Result<T, E> pattern for error handling
    - Follow existing code patterns in the codebase
    - AI features use personas (CPA, Tax Accountant, CFO, Financial Analyst)
    - All financial calculations must be precise (use decimal.js for monetary values)
    - Security is critical - follow docs/SECURITY.md
    - Use Prisma for database operations
    - Follow the existing component structure in src/components/
